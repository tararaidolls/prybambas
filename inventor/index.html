<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventor Lab | Prybambas</title>
    <style>
        :root {
            --magenta: #d92cff;
            --green: #54ff3a;
            --cyan: #00f3ff;
            --bg: #0b1224;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background-color: var(--bg); color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            overflow-x: hidden; display: flex; flex-direction: column; align-items: center;
        }

        .fixed-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('../bg-image.jpg'); 
            background-size: cover; background-position: center center; z-index: -1;
        }

        header {
            width: 90%; max-width: 800px; display: flex; justify-content: space-between; align-items: center;
            margin-top: 20px; z-index: 10;
        }

        .back-btn {
            background: rgba(10,15,30,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 50px;
            text-decoration: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); }

        h1 {
            letter-spacing: 2px; text-shadow: 0 0 15px var(--green); text-align: center; margin: 30px 0; color: white;
        }

        #app-container {
            width: 90%; max-width: 700px; display: flex; flex-direction: column; align-items: center;
            z-index: 10; padding-bottom: 60px;
        }

        /* ========== MENU ========== */
        #menu-screen { display: flex; flex-direction: column; gap: 20px; width: 100%; }

        .mode-btn {
            background: rgba(10,15,30,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 2px dashed var(--green); border-radius: 20px; padding: 20px;
            color: white; font-size: 1.2rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; display: flex; align-items: center; justify-content: flex-start; gap: 20px;
            transition: 0.3s; box-shadow: 0 0 15px rgba(84,255,58,0.2);
        }
        .mode-btn:hover { transform: scale(1.02); box-shadow: 0 0 25px rgba(84,255,58,0.4); }
        .mode-btn .icon { font-size: 2.5rem; filter: drop-shadow(0 0 10px var(--green)); }
        
        .mode-btn.cyan-theme { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,243,255,0.2); }
        .mode-btn.cyan-theme .icon { filter: drop-shadow(0 0 10px var(--cyan)); }
        
        .mode-btn.magenta-theme { border-color: var(--magenta); box-shadow: 0 0 15px rgba(217,44,255,0.2); }
        .mode-btn.magenta-theme .icon { filter: drop-shadow(0 0 10px var(--magenta)); }

        /* ========== SHARED CONTENT SCREEN ========== */
        .content-screen { display: none; width: 100%; flex-direction: column; align-items: center; }
        
        .card {
            background: rgba(10,15,30,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(84,255,58,0.3); border-radius: 20px; padding: 30px; width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 25px; box-sizing: border-box;
        }

        h2.screen-title { color: var(--green); margin-top: 0; text-transform: uppercase; letter-spacing: 1px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }

        .back-to-menu {
            margin-top: 20px; color: rgba(255,255,255,0.5); text-decoration: underline; cursor: pointer; font-size: 1.1rem;
        }

        /* ========== TOOLS EXPLAINER ========== */
        
        .tool-selector { 
            display: flex; 
            gap: 10px; 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
            width: 100%; 
            flex-wrap: wrap; /* Додано wrap, щоб кнопки падали на наступний рядок */
            justify-content: center; /* Центруємо їх красиво */
        }
        .tool-tab {
            background: rgba(255,255,255,0.1); border: 1px solid transparent; color: white; padding: 10px 20px;
            border-radius: 50px; cursor: pointer; white-space: nowrap; font-weight: bold; transition: 0.3s;
            margin-bottom: 5px; /* Відступ знизу, якщо вони впали на наступний рядок */
        }

        
        .tool-tab.active { background: rgba(84,255,58,0.2); border-color: var(--green); color: var(--green); box-shadow: 0 0 10px rgba(84,255,58,0.3); }
        
        .tool-display h3 { color: white; font-size: 1.5rem; margin-top: 0; }
        .tool-display .example { background: rgba(0,243,255,0.1); border-left: 4px solid var(--cyan); padding: 15px; margin-top: 20px; border-radius: 0 10px 10px 0; }

        /* ========== OBSERVATION CALENDAR ========== */
        .calendar-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; width: 100%; margin-bottom: 25px;
        }
        .day-node {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .day-node:hover { background: rgba(0,243,255,0.2); transform: scale(1.1); }
        .day-node.active { background: var(--cyan); color: var(--bg); box-shadow: 0 0 15px var(--cyan); border-color: var(--cyan); }
        
        .challenge-display {
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; text-align: center; border: 1px dashed var(--cyan);
        }

        /* ========== MISSIONS ========== */
        .mission-text { font-size: 1.5rem; font-weight: bold; text-align: center; margin: 30px 0; color: var(--magenta); line-height: 1.4; }
        .generate-btn {
            background: transparent; border: 2px solid var(--magenta); color: white; padding: 15px 30px;
            border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(217,44,255,0.3); margin: 0 auto; display: block;
        }
        .generate-btn:hover { background: var(--magenta); color: white; box-shadow: 0 0 25px rgba(217,44,255,0.6); }


        /* MOBILE FIXES */
        @media (max-width: 600px) {
            #app-container { width: 95%; }
            .card { padding: 15px; width: 100%; max-width: 100vw; overflow-x: hidden; }
            
            h2.screen-title { font-size: 1.2rem; }
            .mode-btn { padding: 15px; font-size: 1rem; }
            .mode-btn .icon { font-size: 2rem; }
            .mission-text { font-size: 1.2rem; }
            .tool-display h3 { font-size: 1.2rem; }
            .tool-display p, .tool-display .example { font-size: 0.95rem; }
        }
    
        .day-node.done {
            background: rgba(0,243,255,0.1);
            border-color: var(--cyan);
            color: var(--cyan);
        }
        .day-node.done::after {
            content: "✓";
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.3;
        }
        .action-btn.done-btn:hover { background: var(--cyan); color: var(--bg); }

    
        /* LEVEL BUTTONS */
        .level-container { display: flex; flex-direction: column; gap: 15px; width: 100%; margin-bottom: 25px; }
        .lvl-btn {
            background: rgba(10,15,30,0.8); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px;
            color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; text-align: left;
            transition: 0.3s; display: flex; align-items: center; justify-content: space-between;
        }
        .lvl-btn:hover { transform: scale(1.02); }
        .lvl-1 { border-left: 8px solid var(--green); box-shadow: 0 5px 15px rgba(84,255,58,0.1); }
        .lvl-2 { border-left: 8px solid #ffcc00; box-shadow: 0 5px 15px rgba(255,204,0,0.1); }
        .lvl-3 { border-left: 8px solid var(--magenta); box-shadow: 0 5px 15px rgba(217,44,255,0.1); }
        
        /* NEW TOOL DISPLAY */
        .tool-grid { display: none; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .tool-mini-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            padding: 15px 10px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .tool-mini-btn:hover { background: rgba(255,255,255,0.1); }
        .tool-mini-btn.active { background: rgba(84,255,58,0.2); border-color: var(--green); }
        .tool-icon { font-size: 2rem; margin-bottom: 5px; }
        .tool-name-mini { font-size: 0.9rem; font-weight: bold; }

        .ex-block { margin-top: 15px; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; }
        .ex-item { margin-bottom: 10px; font-size: 1rem; line-height: 1.4; display: flex; gap: 10px; }
        .ex-icon { font-size: 1.2rem; }

    </style>

</head>
<body>

    <div class="fixed-bg"></div>

    <header>
        <a href="../index.html" class="back-btn">← Hub</a>
        <div id="lang-display" style="font-weight:bold; opacity:0.7;">🇺🇸 EN</div>
    </header>

    <h1>INVENTOR LAB</h1>

    <div id="app-container">

        <!-- MENU -->
        <div id="menu-screen">

                <div class="icon">🛠️</div> <span id="lbl-m1">Tools & Examples</span>

            </div>
            <div class="mode-btn magenta-theme" onclick="openScreen('missions')">
                <div class="icon">🚀</div> <span id="lbl-m4">Mission Possible</span>
            </div>
        </div>

        
        <!-- 1. TOOLS EXPLAINER -->
        <div id="scr-tools" class="content-screen">
            <div class="card">
                <h2 class="screen-title" id="t-scr-tools">Tools & Examples</h2>
                
                <div id="levels-view">
                    <div class="level-container">
                        <button class="lvl-btn lvl-1" onclick="openLevel(1)">
                            <div>🟢 <span id="lbl-l1">Level 1: Beginner</span><div style="font-size:0.8rem; opacity:0.7; font-weight:normal; margin-top:5px;" id="lbl-l1-sub">The basics of invention</div></div>
                            <span>→</span>
                        </button>
                        <button class="lvl-btn lvl-2" onclick="openLevel(2)">
                            <div>🟡 <span id="lbl-l2">Level 2: Smart Thinker</span><div style="font-size:0.8rem; opacity:0.7; font-weight:normal; margin-top:5px;" id="lbl-l2-sub">Tricky ways to solve problems</div></div>
                            <span>→</span>
                        </button>
                        <button class="lvl-btn lvl-3" onclick="openLevel(3)">
                            <div>🔴 <span id="lbl-l3">Level 3: Master Inventor</span><div style="font-size:0.8rem; opacity:0.7; font-weight:normal; margin-top:5px;" id="lbl-l3-sub">Space & Time manipulation</div></div>
                            <span>→</span>
                        </button>
                    </div>
                </div>

                <div id="tools-view" style="display:none;">
                    <div style="margin-bottom:15px; cursor:pointer; color:var(--green); text-decoration:underline;" onclick="closeLevel()" id="lbl-back-lvl">← Back to Levels</div>
                    <div class="tool-grid" id="tool-grid" style="display:grid;"></div>
                    <div class="tool-display" id="tool-content"></div>
                </div>

            </div>
            <div class="back-to-menu" onclick="showMenu()" id="lbl-b1">← Back</div>
        </div>

        <!-- 2. OBSERVATION CALENDAR -->
        <div id="scr-calendar" class="content-screen">
            <div class="card" style="border-color: var(--cyan);">
                <h2 class="screen-title" style="color: var(--cyan);" id="t-scr-cal">30-Day Observation</h2>
                
                <!-- Завдання ЗВЕРХУ -->
                <div class="challenge-display" id="cal-display" style="margin-bottom: 20px; font-size: 1.2rem; min-height: 80px; display: flex; align-items: center; justify-content: center;">
                    <div style="opacity:0.5; font-style:italic;" id="lbl-cal-hint">Select a day below to reveal your mission.</div>
                </div>

                <!-- Кнопка "ЗРОБЛЕНО" -->
                <button id="btn-mark-done" class="action-btn" style="display:none; border-color: var(--cyan); margin: 0 auto 25px auto;" onclick="markDayDone()">Mark as Done ✓</button>
                
                <!-- Сітка-календар ЗНИЗУ -->
                <div class="calendar-grid" id="cal-grid"></div>
            </div>
            <div class="back-to-menu" onclick="showMenu()" id="lbl-b2">← Back</div>
        </div>

        <!-- 4. MISSION POSSIBLE -->
        <div id="scr-missions" class="content-screen">
            <div class="card" style="border-color: var(--magenta);">
                <h2 class="screen-title" style="color: var(--magenta);" id="t-scr-miss">Mission Possible</h2>
                <div class="mission-text" id="mission-content">Are you ready to accept your mission?</div>
                <button class="generate-btn" onclick="generateMission()" id="btn-gen-miss">Give me a mission</button>
            </div>
            <div class="back-to-menu" onclick="showMenu()" id="lbl-b4">← Back</div>
        </div>

    </div>

    <script>
        
        
        const db = {

                    { name: "Об'єднання", sub: "Два в одному", icon: "🤝", desc: "З'єднай дві різні речі в одну, щоб вони працювали разом.", exHome: "Олівець із гумкою на кінці.", exNature: "Зграя риб пливе разом, щоб здаватися однією великою рибою.", exTech: "Швейцарський ніж (багато інструментів у ручці)." },
                    
                    { name: "Заздалегідь", sub: "Машина часу", icon: "⏳", desc: "Зроби частину роботи наперед, щоб у потрібний момент зекономити час.", exHome: "Нарізаний хліб або пакетик чаю.", exNature: "Білки ховають горіхи восени на зиму.", exTech: "Стікери з уже нанесеним клеєм." },
                    { name: "Асиметрія", sub: "Зроби кривим", icon: "⚖️", desc: "Зроби симетричний об'єкт нерівним, щоб додати нову функцію.", exHome: "Ножиці (одне кільце велике, інше мале).", exNature: "Краби-скрипалі мають одну гігантську клешню для захисту.", exTech: "Комп'ютерні мишки, вигнуті під праву руку." },
                    { name: "Округлення", sub: "Хай котиться", icon: "⚽", desc: "Заміни прямі кути на кола або ролики.", exHome: "Коліщатка на важкій валізі.", exNature: "Броненосець згортається в кулю для захисту.", exTech: "Кулькова ручка замість гострого пера." },
                    { name: "Зміна кольору", sub: "Хамелеон", icon: "🎨", desc: "Зміни колір об'єкта або зроби його прозорим, щоб бачити що всередині.", exHome: "Прозора кришка на каструлі.", exNature: "Хамелеон змінює колір, щоб сховатися.", exTech: "Батарейки, які змінюють колір, коли розряджаються." },
                    { name: "Пористість", sub: "Зроби дірки", icon: "🧽", desc: "Зроби предмет пористим (з дірочками), щоб вбирати рідину чи зробити легшим.", exHome: "Губка для миття посуду.", exNature: "Кістки всередині пористі: так вони міцні, але легкі.", exTech: "Пінопласт для пакування." },
                    
                    { name: "Винесення", sub: "Викинь зайве", icon: "🚪", desc: "Відірви від об'єкта тільки ту частину, яка шкодить або заважає.", exHome: "Кондиціонер (шумний мотор винесли на вулицю).", exNature: "Ящірка відкидає хвіст, коли її ловлять.", exTech: "Бездротові навушники (винесли дріт)." },
                    { name: "Динамічність", sub: "Зроби гнучким", icon: "🐍", desc: "Зроби жорстку річ гнучкою, щоб вона могла складатися.", exHome: "Складаний стілець або розкладна парасолька.", exNature: "Хобот слона.", exTech: "Гнучкі екрани смартфонів." },
                    { name: "Самообслуговування", sub: "Зроби сам", icon: "🤖", desc: "Примусь систему саму себе обслуговувати або ремонтувати.", exHome: "Робот-пилосос, який сам їде на зарядку.", exNature: "Коти самі вмиваються язиком.", exTech: "Розумний бетон, який сам затягує свої тріщини під час дощу." },
                    { name: "Зворотний зв'язок", sub: "Розумна реакція", icon: "🔔", desc: "Зроби так, щоб річ сама реагувала на події.", exHome: "Чайник зі свистком (каже, що вода кипить).", exNature: "Біль у руці, коли торкаєшся гарячого.", exTech: "Термостат, який сам вимикає батарею, коли стає тепло." },
                    { name: "Відкидання", sub: "Використай і кинь", icon: "🚀", desc: "Частина об'єкта має відпасти після того, як виконала свою роботу.", exHome: "Обгортка від морозива.", exNature: "Дерева скидають листя на зиму.", exTech: "Ступені космічної ракети, що відпадають у космосі." }
                ],
                calendar: [
                    { t: "Дроблення ✂️", task: "Місія: Знайди у своїй кімнаті річ, яка зроблена з багатьох дрібних шматочків замість одного суцільного. (Підказка: Lego або блискавка на куртці)." },
                    { t: "Матрьошка 🪆", task: "Місія: Досліди кухню. Знайди інструменти або посуд, які ховаються один в один, щоб займати менше місця." },
                    { t: "Асиметрія ⚖️", task: "Місія: Знайди предмет, який спеціально зроблений кривим або неоднаковим з обох сторін. (Підказка: ножиці)." },
                    { t: "Навпаки 🙃", task: "Місія: Знайди річ, яка робить точнісінько протилежне тому, що ти очікуєш. (Підказка: рухає підлогу замість тебе)." },
                    { t: "Об'єднання 🤝", task: "Місія: Знайди у ванній кімнаті інструмент, який поєднує дві різні речі в одну." },
                    { t: "Зміна кольору 🎨", task: "Місія: Знайди об'єкт, який використовує колір (або прозорість), щоб подати сигнал або показати, що всередині." },
                    { t: "Округлення ⚽", task: "Місія: Подивись на машину або важку сумку. Де там використані кола, щоб полегшити життя?" },
                    { t: "Заздалегідь ⏳", task: "Місія: Знайди на кухні щось, що було підготовлено наперед, щоб ти не витрачав час зараз." },
                    { t: "Самообслуговування 🤖", task: "Місія: Знайди вдома річ, яка сама себе вимикає або чистить." },
                    { t: "Динамічність 🐍", task: "Місія: Знайди щось, що зазвичай тверде, але його зробили так, щоб воно складалося чи гнулося." },
                    { t: "Винесення 🚪", task: "Місія: Знайди прилад, де найгучніша або найгарячіша частина винесена на вулицю чи далеко." },
                    { t: "Пористість 🧽", task: "Місія: Знайди об'єкт, який весь у дірочках, щоб вбирати воду або бути легким." },
                    { t: "Відкидання 🚀", task: "Місія: Знайди річ, яку ти викидаєш одразу після того, як вона виконала свою єдину задачу." },
                    { t: "Копіювання 🎭", task: "Місія: Знайди дешеву або безпечну копію небезпечної реальної речі. (Підказка: іграшки)." },
                    { t: "Зворотний зв'язок 🔔", task: "Місія: Знайди пристрій, який 'розмовляє' з тобою (пікає, клацає або світиться), коли закінчує роботу." }
                ]
            }
        };

        let currentLang = 'en';

        window.onload = () => {
            currentLang = localStorage.getItem('prybambas_lang') || 'en';
            if (!db[currentLang]) currentLang = 'en';
            const flags = { en:"🇺🇸 EN", uk:"🇺🇦 UK", es:"🇪🇸 ES", de:"🇩🇪 DE", fr:"🇫🇷 FR", nl:"🇳🇱 NL", ro:"🇷🇴 RO", pl:"🇵🇱 PL", pt:"🇧🇷 PT", da:"🇩🇰 DA", sv:"🇸🇪 SV" };
            document.getElementById('lang-display').innerText = flags[currentLang] || currentLang.toUpperCase();
            
            applyTranslations();
            initScreens();
        };

        function applyTranslations() {
            const t = db[currentLang].menu;
            const l = db[currentLang].levels;
            
            document.getElementById('lbl-m1').innerText = t.m1; document.getElementById('t-scr-tools').innerText = t.m1;
            document.getElementById('lbl-m2').innerText = t.m2; document.getElementById('t-scr-cal').innerText = t.m2;
            document.getElementById('lbl-m4').innerText = t.m4; document.getElementById('t-scr-miss').innerText = t.m4;
            
            document.getElementById('lbl-b1').innerText = t.back;
            document.getElementById('lbl-b2').innerText = t.back;
            document.getElementById('lbl-b4').innerText = t.back;
            
            document.getElementById('lbl-cal-hint').innerText = t.calHint;
            document.getElementById('btn-gen-miss').innerText = t.genBtn;
            
            document.getElementById('lbl-l1').innerText = l.l1; document.getElementById('lbl-l1-sub').innerText = l.l1s;
            document.getElementById('lbl-l2').innerText = l.l2; document.getElementById('lbl-l2-sub').innerText = l.l2s;
            document.getElementById('lbl-l3').innerText = l.l3; document.getElementById('lbl-l3-sub').innerText = l.l3s;
            document.getElementById('lbl-back-lvl').innerText = l.backLvl;
        }

        function showMenu() {
            document.querySelectorAll('.content-screen').forEach(s => s.style.display = 'none');
            document.getElementById('menu-screen').style.display = 'flex';
        }

        function openScreen(id) {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('scr-' + id).style.display = 'flex';
        }

        let currentLevelTools = [];

        function openLevel(lvl) {
            document.getElementById('levels-view').style.display = 'none';
            document.getElementById('tools-view').style.display = 'block';
            
            const grid = document.getElementById('tool-grid');
            grid.innerHTML = '';
            
            // Slice tools array based on level
            const allTools = db[currentLang].tools;
            if (lvl === 1) currentLevelTools = allTools.slice(0, 5);
            else if (lvl === 2) currentLevelTools = allTools.slice(5, 10);
            else currentLevelTools = allTools.slice(10, 15);
            
            currentLevelTools.forEach((tool, i) => {
                const btn = document.createElement('div');
                btn.className = 'tool-mini-btn' + (i===0?' active':'');
                btn.innerHTML = `<div class="tool-icon">${tool.icon}</div><div class="tool-name-mini">${tool.name}</div><div style="font-size:0.75rem; opacity:0.7;">${tool.sub}</div>`;
                btn.onclick = () => {
                    document.querySelectorAll('.tool-mini-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showToolContent(i);
                };
                grid.appendChild(btn);
            });
            showToolContent(0);
        }

        function closeLevel() {
            document.getElementById('tools-view').style.display = 'none';
            document.getElementById('levels-view').style.display = 'block';
        }

        function showToolContent(index) {
            const tool = currentLevelTools[index];
            document.getElementById('tool-content').innerHTML = `
                <h3 style="color:white; margin-bottom:5px;">${tool.icon} ${tool.name}</h3>
                <div style="color:var(--cyan); font-weight:bold; margin-bottom:15px; font-size:0.9rem;">"${tool.sub}"</div>
                <p style="font-size:1.1rem;">${tool.desc}</p>
                <div class="ex-block">
                    <div class="ex-item"><span class="ex-icon">🏠</span> <div><strong>Home:</strong> ${tool.exHome}</div></div>
                    <div class="ex-item"><span class="ex-icon">🌿</span> <div><strong>Nature:</strong> ${tool.exNature}</div></div>
                    <div class="ex-item"><span class="ex-icon">🚀</span> <div><strong>Tech:</strong> ${tool.exTech}</div></div>
                </div>
            `;
        }

        let currentDay = 0;
        let progressData = JSON.parse(localStorage.getItem('prybambas_cal_progress')) || {};

        function initScreens() {
            // Calendar Setup (15 days for deep learning)
            const calGrid = document.getElementById('cal-grid');
            calGrid.innerHTML = '';
            for(let i=1; i<=15; i++) {
                const day = document.createElement('div');
                day.className = 'day-node';
                if(progressData[i]) day.classList.add('done');
                
                day.innerText = i;
                day.onclick = () => {
                    document.querySelectorAll('.day-node').forEach(d => d.classList.remove('active'));
                    day.classList.add('active');
                    currentDay = i;
                    
                    const obsList = db[currentLang].calendar;
                    const challenge = obsList[(i-1)];
                    
                    document.getElementById('cal-display').innerHTML = `
                        <div style="color:var(--cyan); font-weight:bold; margin-bottom:10px;">DAY ${i}: Hunt for ${challenge.t}</div>
                        <div style="font-size:1.1rem; line-height:1.4;">${challenge.task}</div>
                    `;
                    
                    const doneBtn = document.getElementById('btn-mark-done');
                    doneBtn.style.display = 'block';
                    if(progressData[i]) {
                        doneBtn.innerText = currentLang === 'uk' ? "Виконано ✓" : "Done ✓";
                        doneBtn.style.background = "var(--cyan)";
                        doneBtn.style.color = "var(--bg)";
                    } else {
                        doneBtn.innerText = currentLang === 'uk' ? "Відмітити як виконане" : "Mark as Done";
                        doneBtn.style.background = "transparent";
                        doneBtn.style.color = "white";
                    }
                };
                calGrid.appendChild(day);
            }
        }

        function markDayDone() {
            if(currentDay === 0) return;
            progressData[currentDay] = true;
            localStorage.setItem('prybambas_cal_progress', JSON.stringify(progressData));
            initScreens(); // re-render grid
            const days = document.querySelectorAll('.day-node');
            days[currentDay-1].click();
        }

        function generateMission() {
            const missions = db[currentLang].missions;
            const random = missions[Math.floor(Math.random() * missions.length)];
            const el = document.getElementById('mission-content');
            el.style.opacity = '0';
            setTimeout(() => {
                el.innerText = random;
                el.style.opacity = '1';
                el.style.transition = 'opacity 0.5s';
            }, 200);
        }

    </script>
</body>
</html>
