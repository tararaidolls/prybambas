<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Coach | Prybambas</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --magenta: #d92cff;
            --green: #54ff3a;
            --cyan: #00f3ff;
            --bg: #020617;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: white;
            font-family: 'Nunito', sans-serif;
            overflow-x: hidden; display: flex; flex-direction: column; align-items: center;
        }

        /* Уніфікована панель вгорі */
        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            padding: 15px 15px 0 15px;
            z-index: 100;
        }

        .back-btn {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--cyan);
            color: white; 
            padding: 8px 16px; 
            border-radius: 50px;
            text-decoration: none; 
            font-weight: bold; 
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3); 
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }
        .back-btn:hover { background: rgba(0, 243, 255, 0.2); }

        .lang-switch {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--cyan);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            font-weight: bold;
        }

        /* Логотип серії */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        
        .logo-svg {
            width: 35px;
            height: 35px;
            filter: drop-shadow(0 0 8px var(--cyan));
        }

        .logo-text {
            color: white;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 1.3rem;
            text-shadow: 0 0 10px var(--cyan);
        }

        /* ЧАТ-ІНТЕРФЕЙС ШІ */
        .chat-card {
            width: 90%; max-width: 450px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 2px solid var(--cyan);
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 243, 255, 0.1);
            display: flex; flex-direction: column;
            height: 520px;
        }

        .chat-header {
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        .chat-header h2 { font-size: 1.1rem; font-weight: 800; color: var(--cyan); }
        .chat-header p { font-size: 0.75rem; color: #94a3b8; margin-top: 2px; }

        /* ВЕЛИКА КНОПКА ЗАПУСКУ РЕАЛЬНОГО ЧАТУ (LAUNCH CUSTOM GPT) */
        .launch-btn {
            background: linear-gradient(135deg, #0f172a 0%, #0c4a6e 100%);
            border: 2.5px solid var(--cyan);
            border-radius: 16px;
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
            transition: 0.3s;
        }
        .launch-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
            background: rgba(0, 243, 255, 0.15);
        }

        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px;
            padding-right: 5px;
            scrollbar-width: none;
        }
        .chat-messages::-webkit-scrollbar { display: none; }

        .msg {
            max-width: 85%; padding: 10px 15px; border-radius: 16px; font-size: 0.9rem; line-height: 1.4;
        }
        .msg.bot {
            background: rgba(2, 6, 23, 0.8);
            color: white; border: 1px solid rgba(0, 243, 255, 0.2);
            align-self: flex-start;
            border-top-left-radius: 4px;
        }
        .msg.user {
            background: var(--cyan);
            color: black; font-weight: 700;
            align-self: flex-end;
            border-top-right-radius: 4px;
        }

        .chat-input-area {
            display: flex; gap: 8px; margin-top: 15px;
            border-top: 1px solid rgba(0, 243, 255, 0.2);
            padding-top: 15px;
        }

        .chat-input {
            flex-grow: 1; background: rgba(2, 6, 23, 0.8); border: 1px solid #475569;
            border-radius: 30px; padding: 10px 18px; color: white; outline: none;
            font-family: 'Nunito', sans-serif; font-size: 0.9rem;
        }
        .chat-input:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }

        .send-btn {
            background: var(--cyan); color: black; border: none; width: 40px; height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; flex-shrink: 0; font-size: 1.1rem;
        }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 0 10px rgba(0, 243, 255, 0.4); }
    </style>
</head>
<body>

    <!-- Уніфікована панель вгорі -->
    <div class="top-bar">
        <a href="../index.html" class="back-btn" id="btn-back">← Hub</a>
        <select class="lang-switch" id="lang-selector" onchange="changeLang()">
            <option value="en">🇺🇸 EN</option>
            <option value="uk">🇺🇦 UK</option>
            <option value="es">🇪🇸 ES</option>
            <option value="de">🇩🇪 DE</option>
            <option value="fr">🇫🇷 FR</option>
            <option value="nl">🇳🇱 NL</option>
            <option value="da">🇩🇰 DA</option>
            <option value="sv">🇸🇪 SV</option>
            <option value="ro">🇷🇴 RO</option>
            <option value="pl">🇵🇱 PL</option>
            <option value="pt">🇧🇷 PT</option>
        </select>
    </div>

    <!-- Логотип серії -->
    <div class="logo-container">
        <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="40" stroke="var(--cyan)" stroke-width="4" stroke-dasharray="10 6" />
            <path d="M50 30 C35 30 35 70 50 70 C65 70 65 30 50 30 Z" stroke="white" stroke-width="3" />
        </svg>
        <span class="logo-text">AI COACH</span>
    </div>

    <div class="chat-card">
        <div class="chat-header">
            <h2 id="header-title">Polyglot AI Coach</h2>
            <p id="header-desc">Practice what you write with your virtual language coach!</p>
        </div>

        <!-- КНОПКА ПЕРЕХОДУ НА CUSTOM GPT (Для перевірки по фотографії) -->
        <a href="https://chatgpt.com/g/g-your-coach-id-here" class="launch-btn" target="_blank" id="launch-gpt-btn">
            📸 Check Handwriting by Photo
        </a>

        <div class="chat-messages" id="chat-box">
            <div class="msg bot" id="welcome-msg">Hi! I am your virtual language coach. Type a sentence using one of the verbs from your workbook, and I will correct any mistakes or practice with you!</div>
        </div>

        <div class="chat-input-area">
            <input type="text" class="chat-input" id="user-input" placeholder="Type a sentence..." onkeydown="if(event.key === 'Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➔</button>
        </div>
    </div>

    <script>
        const dict = {
            en: {
                back: "← Hub",
                header: "Polyglot AI Coach",
                desc: "Practice what you write with your virtual language coach!",
                welcome: "Hi! I am your virtual language coach. Type a sentence using one of the verbs from your workbook, and I will correct any mistakes or practice with you!",
                placeholder: "Type a sentence...",
                bot_thinking: "Thinking...",
                launch: "📸 Check Handwriting by Photo",
                bot_reply: "Excellent sentence! Your grammar is perfect. Keep practicing! 🚀"
            },
            uk: {
                back: "← Хаб",
                header: "AI Мовний Тренер",
                desc: "Практикуй написане разом зі своїм віртуальним наставником!",
                welcome: "Привіт! Я твій мовний тренер. Напиши речення, використовуючи будь-яке дієслово з твого зошита, і я перевірю твою граматику!",
                placeholder: "Напиши речення...",
                bot_thinking: "Думаю...",
                launch: "📸 Перевірити зошит по фото",
                bot_reply: "Чудове речення! Твоя граматика ідеальна. Продовжуй практикуватися! 🚀"
            }
        };

        let currentLang = 'en';

        function changeLang() {
            currentLang = document.getElementById('lang-selector').value;
            localStorage.setItem('prybambas_lang', currentLang);
            
            const t = dict[currentLang] || dict['en'];
            document.getElementById('btn-back').innerText = t.back;
            document.getElementById('header-title').innerText = t.header;
            document.getElementById('header-desc').innerText = t.desc;
            document.getElementById('welcome-msg').innerText = t.welcome;
            document.getElementById('user-input').placeholder = t.placeholder;
            document.getElementById('launch-gpt-btn').innerText = t.launch;
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;

            const chatBox = document.getElementById('chat-box');
            
            // 1. User Message
            const uMsg = document.createElement('div');
            uMsg.className = 'msg user';
            uMsg.innerText = text;
            chatBox.appendChild(uMsg);
            
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // 2. Bot Thinking
            const tMsg = document.createElement('div');
            tMsg.className = 'msg bot';
            tMsg.innerText = dict[currentLang] ? dict[currentLang].bot_thinking : dict['en'].bot_thinking;
            chatBox.appendChild(tMsg);
            chatBox.scrollTop = chatBox.scrollHeight;

            // 3. Bot Actual Reply (Simulated for local offline PWA / Wizard of Oz)
            setTimeout(() => {
                tMsg.innerText = dict[currentLang] ? dict[currentLang].bot_reply : dict['en'].bot_reply;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1000);
        }

        window.onload = function() {
            const savedLang = localStorage.getItem('prybambas_lang') || 'en';
            document.getElementById('lang-selector').value = savedLang;
            changeLang();
        }
    </script>
</body>
</html>
