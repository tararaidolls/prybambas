<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logical Chain | What If?</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --magenta: #d92cff;
            --green: #54ff3a;
            --bg: #020617;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: white; font-family: 'Nunito', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* Уніфікована панель вгорі */
        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            padding: 15px 15px 0 15px;
            z-index: 100;
        }

        .back-btn {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--magenta);
            color: white; 
            padding: 8px 16px; 
            border-radius: 50px;
            text-decoration: none; 
            font-weight: bold; 
            box-shadow: 0 0 10px rgba(217, 44, 255, 0.3); 
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }
        .back-btn:hover { background: rgba(217, 44, 255, 0.2); }

        .lang-switch {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--magenta);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 10px rgba(217, 44, 255, 0.3);
            font-weight: bold;
        }

        /* Логотип серії */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        
        .logo-svg {
            width: 35px;
            height: 35px;
            filter: drop-shadow(0 0 8px var(--magenta));
        }

        .logo-text {
            color: white;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 1.3rem;
            text-shadow: 0 0 10px var(--magenta);
        }

        /* ГОЛОВНИЙ ЕКРАН */
        .main-card {
            width: 90%; max-width: 450px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 2px solid var(--magenta);
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 15px rgba(217, 44, 255, 0.1);
            display: flex; flex-direction: column; align-items: center;
            min-height: 520px;
        }

        header h1 {
            font-size: 1.25rem; font-weight: 800; color: white; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;
            text-align: center;
        }

        #game-area { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        
        .box { 
            background: rgba(15, 23, 42, 0.8); 
            border: 2px solid white; 
            border-radius: 16px; 
            padding: 14px 18px; 
            text-align: center; 
            font-weight: 800; 
            font-size: 0.95rem; 
            line-height: 1.4;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .box.start { border-color: #ff9f43; color: #ff9f43; background: rgba(255, 159, 67, 0.05); }
        .box.end { border-color: var(--magenta); color: #d92cff; background: rgba(217, 44, 255, 0.05); }
        .box.step { border-color: var(--green); display: none; color: #54ff3a; animation: popIn 0.4s ease-out; }
        
        @keyframes popIn { from { transform: scale(0.9); opacity: 0;} to { transform: scale(1); opacity: 1;} }
        
        .arrow { text-align: center; color: rgba(255,255,255,0.4); font-size: 1.2rem; display: none; font-weight: bold; }
        
        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-top: auto; }
        .action-btn { 
            background: transparent; 
            border: 2px solid var(--magenta); 
            color: white; 
            padding: 14px; 
            border-radius: 14px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s; 
            width: 100%; 
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .action-btn:hover { background: var(--magenta); color: #020617; box-shadow: 0 0 15px rgba(217, 44, 255, 0.4); }

        /* UPSELL BANNER (Inlined inside main-card to remain style stable) */
        .promo-banner {
            margin-top: 20px; 
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%); 
            border-radius: 16px;
            padding: 12px 18px; 
            width: 100%; 
            border: 2px solid var(--magenta); 
            box-shadow: 0 0 12px rgba(217, 44, 255, 0.2);
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            text-decoration: none; 
            color: white;
            transition: 0.3s;
        }
        .promo-banner:hover {
            transform: scale(1.02);
            box-shadow: 0 0 18px rgba(217, 44, 255, 0.4);
        }
        .promo-text h3 { margin: 0 0 3px 0; font-size: 0.95rem; color: var(--magenta); font-weight:800; text-transform: uppercase; }
        .promo-text p { margin: 0; font-size: 0.8rem; color: #cbd5e1; line-height: 1.3; }
        .promo-btn { 
            background: var(--magenta); 
            color: white; 
            padding: 8px 14px; 
            border-radius: 30px; 
            font-size: 0.75rem; 
            font-weight: 900; 
            white-space: nowrap; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Уніфікована панель вгорі -->
    <div class="top-bar">
        <a href="../index.html" class="back-btn" id="btn-back">← Hub</a>
        <select class="lang-switch" id="lang-selector" onchange="changeLang()">
            <option value="en">🇺🇸 EN</option>
            <option value="uk">🇺🇦 UK</option>
            <option value="es">🇪🇸 ES</option>
            <option value="de">🇩🇪 DE</option>
            <option value="fr">🇫🇷 FR</option>
            <option value="nl">🇳🇱 NL</option>
            <option value="da">🇩🇰 DA</option>
            <option value="sv">🇸🇪 SV</option>
            <option value="ro">🇷🇴 RO</option>
            <option value="pl">🇵🇱 PL</option>
            <option value="pt">🇧🇷 PT</option>
        </select>
    </div>

    <!-- Логотип серії -->
    <div class="logo-container">
        <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 20 C25 20 20 50 50 80 C80 50 75 20 50 20 Z" stroke="var(--magenta)" stroke-width="4" stroke-linejoin="round" />
            <circle cx="50" cy="45" r="10" stroke="white" stroke-width="3" />
        </svg>
        <span class="logo-text">WHAT IF?</span>
    </div>

    <div class="main-card">
        <header>
            <h1 id="scr-title">Logical Chain</h1>
        </header>
        
        <div id="game-area">
            <div class="box start" id="b-start">START</div>
            
            <div class="arrow" id="arr1">↓</div>
            <div class="box step" id="s1">Step 1</div>
            <div class="arrow" id="arr2">↓</div>
            <div class="box step" id="s2">Step 2</div>
            <div class="arrow" id="arr3">↓</div>
            <div class="box step" id="s3">Step 3</div>
            
            <div class="arrow" style="display:block;" id="arr-final">↓</div>
            <div class="box end" id="b-end">END</div>
        </div>
        
        <div class="btn-group">
            <button class="action-btn" id="btn-reveal" onclick="revealLogic()">REVEAL LOGIC</button>
            <button class="action-btn" id="btn-next" onclick="nextRound()" style="border-color:white;">NEXT ROUND ➔</button>
        </div>

        <!-- РЕКЛАМНИЙ БАНЕР / Пропозиція Книги (Upsell) -->
        <a href="https://www.amazon.com/dp/B0BRC7Z2NW" class="promo-banner" target="_blank">
            <div class="promo-text">
                <h3 id="promo-title">Offline Brain Fitness</h3>
                <p id="promo-subtitle">Get the physical "What If?" workbook with 100+ logical puzzles to build critical thinking away from screens.</p>
            </div>
            <div class="promo-btn" id="promo-btn-lbl">Get Book</div>
        </a>
    </div>

    <script>
        const gamesData = {
            en: [
                {
                    start: "What if gravity turned off for exactly 1 minute every day?",
                    steps: ["People and objects float up in the air.", "Everyone hits their head on the ceiling.", "Helmets become mandatory indoor fashion."],
                    end: "Helmets become mandatory indoor fashion."
                },
                {
                    start: "What if animals could talk, but only complained about the weather?",
                    steps: ["Dogs refuse to walk in the rain & argue loudly.", "Special dog-umbrella sales skyrocket.", "Weather forecasting is done by asking pigeons."],
                    end: "Weather forecasting is done by asking pigeons."
                },
                {
                    start: "What if all the oceans were replaced with orange juice?",
                    steps: ["The ocean becomes highly acidic and sweet.", "Fish develop mutations to survive the citric acid.", "Sharks become addicted to sugar and swim faster."],
                    end: "Sharks become addicted to sugar and swim faster."
                },
                {
                    start: "What if you could only move by jumping like a kangaroo?",
                    steps: ["Walking and running become strictly impossible.", "Ceilings in all houses are built 3x higher.", "Sidewalks are replaced by massive trampolines."],
                    end: "Trampolines replace all city sidewalks."
                },
                {
                    start: "What if every lie made your nose literally grow like Pinocchio?",
                    steps: ["Politicians have 10-foot long noses.", "Office and house doors must be widened.", "Nose-trimming becomes a daily morning routine."],
                    end: "Nose-trimming becomes a daily morning routine."
                },
                {
                    start: "What if clouds were made of sweet cotton candy?",
                    steps: ["It rains sticky sugar water.", "All cars and streets get incredibly sticky.", "Car washes are replaced by licking-machines."],
                    end: "Car washes are replaced by licking-machines."
                }
            ],
            uk: [
                {
                    start: "Що, якби сила тяжіння вимикалася на 1 хвилину щодня?",
                    steps: ["Усі люди та предмети починають літати.", "Кожен сильно б'ється головою об стелю.", "Шоломи стають обов'язковою домашньою модою."],
                    end: "Шоломи стають обов'язковою домашньою модою."
                },
                {
                    start: "Що, якби тварини тільки скаржилися на погоду?",
                    steps: ["Собаки відмовляються гуляти в дощ і лаються.", "Продажі парасольок для тварин злітають у космос.", "Прогноз погоди роблять через опитування голубів."],
                    end: "Прогноз погоди роблять через опитування голубів."
                },
                {
                    start: "Що, якби всі океани замінили на апельсиновий сік?",
                    steps: ["Вода в океанах стає дуже кислою та солодкою.", "Риби мутують, щоб вижити у лимонній кислоті.", "Акули стають залежними від цукру і плавають швидше."],
                    end: "Акули стають залежними від цукру і плавають швидше."
                },
                {
                    start: "Що, якби ми пересувалися лише стрибками?",
                    steps: ["Звичайна ходьба стає повністю неможливою.", "Стелі в будинках будують утричі вищими.", "Тротуари замінюють на гігантські батути."],
                    end: "Тротуари замінюють на гігантські батути."
                },
                {
                    start: "Що, якби кожна брехня змушувала ніс рости?",
                    steps: ["У політиків виростають 3-метрові носи.", "Дверні прорізи доводиться розширювати у два рази.", "Підрізання носа стає щоденною ранковою рутиною."],
                    end: "Підрізання носа стає щоденною ранковою рутиною."
                },
                {
                    start: "Що, якби хмари були з цукрової вати?",
                    steps: ["З неба починає йти липкий цукровий дощ.", "Усі вулиці та автомобілі стають суперлипкими.", "Автомийки замінюють на гігантські машини-язики."],
                    end: "Автомийки замінюють на гігантські машини-язики."
                }
            ]
        };

        const translationDict = {
            en: {
                title: "Logical Chain",
                reveal: "Reveal Logic",
                next: "NEXT ROUND ➔",
                promo_t: "Offline Brain Fitness",
                promo_st: "Get the physical 'What If?' workbook with 100+ logical puzzles to build critical thinking away from screens.",
                promo_btn: "Get Book",
                back: "← Hub"
            },
            uk: {
                title: "Логічний Ланцюг",
                reveal: "Показати Логіку",
                next: "Наступний раунд ➔",
                promo_t: "Розумний відпочинок",
                promo_st: "Отримайте велику книгу логічних ланцюжків 'Що, якби?' на Amazon! 100+ завдань для розвитку мислення без екранів.",
                promo_btn: "Купити",
                back: "← Хаб"
            }
        };

        let currentLang = 'en';
        let currentItem = null;
        let revealedSteps = 0;
        
        function changeLang() {
            currentLang = document.getElementById('lang-selector').value;
            localStorage.setItem('prybambas_lang', currentLang);
            
            // Apply UI Translations
            const ui = translationDict[currentLang] || translationDict['en'];
            document.getElementById('scr-title').innerText = ui.title;
            document.getElementById('btn-reveal').innerText = ui.reveal;
            document.getElementById('btn-next').innerText = ui.next;
            document.getElementById('promo-title').innerText = ui.promo.t;
            document.getElementById('promo-subtitle').innerText = ui.promo.st;
            document.getElementById('promo-btn-lbl').innerText = ui.promo.btn;
            document.getElementById('btn-back').innerText = ui.back;

            nextRound();
        }

        function nextRound() {
            const list = gamesData[currentLang] || gamesData['en'];
            currentItem = list[Math.floor(Math.random() * list.length)];
            revealedSteps = 0;
            
            // Set values
            document.getElementById('b-start').innerText = currentItem.start;
            document.getElementById('b-end').innerText = currentItem.end;
            
            for (let i = 1; i <= 3; i++) {
                document.getElementById(`s${i}`).innerText = currentItem.steps[i-1];
                document.getElementById(`s${i}`).style.display = 'none';
                document.getElementById(`arr${i}`).style.display = 'none';
            }
            document.getElementById('arr-final').style.display = 'block';
            document.getElementById('btn-reveal').style.display = 'block';
        }

        function revealLogic() {
            if (revealedSteps < 3) {
                revealedSteps++;
                document.getElementById(`s${revealedSteps}`).style.display = 'block';
                document.getElementById(`arr${revealedSteps}`).style.display = 'block';
                
                if (revealedSteps === 3) {
                    document.getElementById('btn-reveal').style.display = 'none';
                }
            }
        }

        window.onload = function() {
            currentLang = localStorage.getItem('prybambas_lang') || 'en';
            document.getElementById('lang-selector').value = currentLang;
            changeLang();
        }
    </script>
</body>
</html>
