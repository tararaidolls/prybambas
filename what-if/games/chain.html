<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Логічний Ланцюжок | What If?</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --magenta: #d92cff;
            --green: #54ff3a;
            --bg: #020617;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: white; font-family: 'Nunito', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* Уніфікована панель вгорі */
        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            padding: 15px 15px 0 15px;
            z-index: 100;
        }

        .back-btn {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--magenta);
            color: white; 
            padding: 8px 16px; 
            border-radius: 50px;
            text-decoration: none; 
            font-weight: bold; 
            box-shadow: 0 0 10px rgba(217, 44, 255, 0.3); 
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }
        .back-btn:hover { background: rgba(217, 44, 255, 0.2); }

        .lang-switch {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--magenta);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 10px rgba(217, 44, 255, 0.3);
            font-weight: bold;
        }

        /* Логотип серії */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        
        .logo-svg {
            width: 35px;
            height: 35px;
            filter: drop-shadow(0 0 8px var(--magenta));
        }

        .logo-text {
            color: white;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 1.3rem;
            text-shadow: 0 0 10px var(--magenta);
        }

        /* ГОЛОВНИЙ ЕКРАН */
        .main-card {
            width: 90%; max-width: 450px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 2px solid var(--magenta);
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 15px rgba(217, 44, 255, 0.1);
            display: flex; flex-direction: column; align-items: center;
            min-height: 520px;
        }

        header h1 {
            font-size: 1.25rem; font-weight: 800; color: white; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;
            text-align: center;
        }

        #game-area { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        
        .box { 
            background: rgba(15, 23, 42, 0.8); 
            border: 2px solid white; 
            border-radius: 16px; 
            padding: 14px 18px; 
            text-align: center; 
            font-weight: 800; 
            font-size: 0.95rem; 
            line-height: 1.4;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .box.start { border-color: #ff9f43; color: #ff9f43; background: rgba(255, 159, 67, 0.05); }
        .box.end { border-color: var(--magenta); color: #d92cff; background: rgba(217, 44, 255, 0.05); }
        .box.step { border-color: var(--green); display: none; color: #54ff3a; animation: popIn 0.4s ease-out; }
        
        @keyframes popIn { from { transform: scale(0.9); opacity: 0;} to { transform: scale(1); opacity: 1;} }
        
        .arrow { text-align: center; color: rgba(255,255,255,0.4); font-size: 1.2rem; display: none; font-weight: bold; }
        
        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-top: auto; }
        .action-btn { 
            background: transparent; 
            border: 2px solid var(--magenta); 
            color: white; 
            padding: 14px; 
            border-radius: 14px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s; 
            width: 100%; 
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .action-btn:hover { background: var(--magenta); color: #020617; box-shadow: 0 0 15px rgba(217, 44, 255, 0.4); }

        /* UPSELL BANNER (Inlined inside main-card to remain style stable) */
        .promo-banner {
            margin-top: 20px; 
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%); 
            border-radius: 16px;
            padding: 12px 18px; 
            width: 100%; 
            border: 2px solid var(--magenta); 
            box-shadow: 0 0 12px rgba(217, 44, 255, 0.2);
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            text-decoration: none; 
            color: white;
            transition: 0.3s;
        }
        .promo-banner:hover {
            transform: scale(1.02);
            box-shadow: 0 0 18px rgba(217, 44, 255, 0.4);
        }
        .promo-text h3 { margin: 0 0 3px 0; font-size: 0.95rem; color: var(--magenta); font-weight:800; text-transform: uppercase; }
        .promo-text p { margin: 0; font-size: 0.8rem; color: #cbd5e1; line-height: 1.3; }
        .promo-btn { 
            background: var(--magenta); 
            color: white; 
            padding: 8px 14px; 
            border-radius: 30px; 
            font-size: 0.75rem; 
            font-weight: 900; 
            white-space: nowrap; 
            text-transform: uppercase;
        }
    </style>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="8460fd7f-da31-46c7-8c9d-eff5e64399cc"></script>

    <script>

        const localizedData = {

            da: typeof whatif_chain_da !== 'undefined' ? whatif_chain_da : [],
            es: typeof whatif_chain_es !== 'undefined' ? whatif_chain_es : [],
            pt: typeof whatif_chain_pt !== 'undefined' ? whatif_chain_pt : [],
            he: typeof whatif_chain_he !== 'undefined' ? whatif_chain_he : [],
            ja: typeof whatif_chain_ja !== 'undefined' ? whatif_chain_ja : [],
            ar: typeof whatif_chain_ar !== 'undefined' ? whatif_chain_ar : [],

        const translationDict = {

            en: {
                title: "Logical Chain", reveal: "REVEAL LOGIC", next: "NEXT ROUND ➔",
                promo_t: "Smart Brain Workout", promo_st: "Get the physical 'What If?' workbook with 100+ logic puzzles for critical thinking without screens.", promo_btn: "Buy", back: "← Hub", start_label: "START", end_label: "END"
            },
            uk: {
                title: "Логічний ланцюжок", reveal: "Відкрити логіку", next: "Наступний раунд ➔",
                promo_t: "Розумна зарядка для мозку", promo_st: "Отримайте фізичний зошит 'What If?' із понад 100 логічними задачами для розвитку критичного мислення без екранів.", promo_btn: "Купити", back: "← Hub", start_label: "ПОЧАТОК", end_label: "ФІНАЛ"
            },
            ro: {
                title: "Lanț Logic", reveal: "Arată Logica", next: "Următorul Raound ➔",
                promo_t: "Antrenament Cerebral Offline", promo_st: "Cumpără caietul fizic 'What If?' cu peste 100 de puzzle-uri logice pentru gândire critică fără ecrane.", promo_btn: "Cumpără", back: "← Hub", start_label: "START", end_label: "FINAL"
            },
            pl: {
                title: "Łańcuch Logiczny", reveal: "Pokaż logikę", next: "NASTĘPNA RUNDA ➔",
                promo_t: "Trening Mózgu Offline", promo_st: "Kup papierowy zeszyt 'What If?' z ponad 100 łamigłówkami logicznymi, aby trenować myślenie krytyczne bez ekranów.", promo_btn: "Kup teraz", back: "← Hub", start_label: "START", end_label: "KONIEC"
            },
            de: {
                title: "Logische Kette", reveal: "Logik anzeigen", next: "NÄCHSTE RUNDE ➔",
                promo_t: "Offline-Gehirn-Fitness", promo_st: "Hol dir das physische 'What If?'-Arbeitsbuch mit über 100 Logikrätseln, um kritisches Denken ohne Bildschirme zu trainieren.", promo_btn: "Kaufen", back: "← Hub", start_label: "START", end_label: "ENDE"
            },
            fr: {
                title: "Chaîne Logique", reveal: "Révéler la logique", next: "ROUND SUIVANT ➔",
                promo_t: "Gymnastique Cérébrale Offline", promo_st: "Obtenez le cahier physique 'What If?' avec plus de 100 énigmes logiques pour la pensée critique sans écrans.", promo_btn: "Acheter", back: "← Hub", start_label: "DÉBUT", end_label: "FIN"
            },
            it: {
                title: "Catena Logica", reveal: "Mostra la logica", next: "PROSSIMO ROUND ➔",
                promo_t: "Allenamento Cerebrale Offline", promo_st: "Ottieni il quaderno fisico 'What If?' con oltre 100 puzzle logici per il pensiero critico senza schermi.", promo_btn: "Acquista", back: "← Hub", start_label: "INIZIO", end_label: "FINE"
            },
            sv: {
                title: "Logisk Kedja", reveal: "Visa logiken", next: "NÄSTA RUNDA ➔",
                promo_t: "Hjärnträning Offline", promo_st: "Skaffa den fysiska 'What If?'-boken med över 100 logikpussel för kritiskt tänkande utan skärmar.", promo_btn: "Köp", back: "← Hub", start_label: "START", end_label: "SLUT"
            },
            fi: {
                title: "Logiikkaketju", reveal: "Näytä logiikka", next: "SEURAAVA KIERROS ➔",
                promo_t: "Aivojumppa Offline", promo_st: "Hanki fyysinen 'What If?' -vihko yli 100 logiikka-arvoituksella kriittiseen ajatteluun ilman näyttöjä.", promo_btn: "Osta", back: "← Hub", start_label: "ALKU", end_label: "LOPPU"
            },
            da: {
                title: "Logisk Kæde", reveal: "Vis logikken", next: "NÆSTE RUNDE ➔",
                promo_t: "Hjernetræning Offline", promo_st: "Få den fysiske 'What If?'-bog med over 100 logikgåder til kritisk tænkning uden skærme.", promo_btn: "Køb", back: "← Hub", start_label: "START", end_label: "SLUT"
            },
            es: {
                title: "Cadena Lógica", reveal: "Ver lógica", next: "SIGUIENTE RONDA ➔",
                promo_t: "Fitness Cerebral Offline", promo_st: "Consigue el cuaderno físico 'What If?' con más de 100 acertijos lógicos para entrenar el pensamiento crítico lejos de las pantallas.", promo_btn: "Comprar", back: "← Hub", start_label: "INICIO", end_label: "FINAL"
            },
            pt: {
                title: "Cadeia Lógica", reveal: "Revelar lógica", next: "PRÓXIMA RODADA ➔",
                promo_t: "Treino Cerebral Offline", promo_st: "Obtenha o caderno físico 'What If?' com mais de 100 quebra-cabeças lógicos para pensamento crítico sem telas.", promo_btn: "Comprar", back: "← Hub", start_label: "INÍCIO", end_label: "FIM"
            },
            he: {
                title: "שרשרת לוגית", reveal: "חשוף את הלוגיקה", next: "סיבוב הבא ➔",
                promo_t: "אימון מוח אופליין", promo_st: "קבלו את חוברת 'What If?' הפיזית עם יותר מ-100 חידות לוגיות לחשיבה ביקורתית בלי מסכים.", promo_btn: "קנו", back: "← Hub", start_label: "התחלה", end_label: "סוף"
            },
            ja: {
                title: "論理チェーン", reveal: "論理を表示", next: "次のラウンド ➔",
                promo_t: "オフライン脳トレ", promo_st: "画面なしで批判的思考を鍛える100以上の論理パズル入り物理版『What If?』を手に入れよう。", promo_btn: "購入", back: "← Hub", start_label: "スタート", end_label: "エンド"
            },
            ar: {
                title: "سلسلة منطقية", reveal: "اكشف المنطق", next: "الجولة التالية ➔",
                promo_t: "تمرين الدماغ دون اتصال", promo_st: "احصل على دفتر 'What If?' الورقي مع أكثر من 100 لغز منطقي للتفكير النقدي بدون شاشات.", promo_btn: "اشترِ", back: "← Hub", start_label: "البداية", end_label: "النهاية"
            },

                };

        let currentLang = 'en';
        let currentIndex = -1;
        let revealedSteps = 0;
        
        function changeLang() {
            currentLang = document.getElementById('lang-selector').value;
            localStorage.setItem('prybambas_lang', currentLang);
            
            // Apply UI Translations
            const ui = translationDict[currentLang] || translationDict['en'];
            document.getElementById('scr-title').innerText = ui.title;
            document.getElementById('btn-reveal').innerText = ui.reveal;
            document.getElementById('btn-next').innerText = ui.next;
            document.getElementById('promo-title').innerText = ui.promo_t;
            document.getElementById('promo-subtitle').innerText = ui.promo_st;
            document.getElementById('promo-btn-lbl').innerText = ui.promo_btn;
            document.getElementById('btn-back').innerText = ui.back;

            // Оновлюємо поточне питання на льоту! (UX FIX - No more sync bugs)
            const list = localizedData[currentLang] || localizedData['en'];
            if (list.length > 0) {
                if (currentIndex === -1) {
                    currentIndex = Math.floor(Math.random() * list.length);
                }
                // Захист індексу при переході між базами різної довжини
                const safeIndex = currentIndex % list.length;
                const item = list[safeIndex];

                document.getElementById('b-start').innerText = item.start;
                document.getElementById('b-end').innerText = item.end;
                
                for (let i = 1; i <= 3; i++) {
                    document.getElementById(`s${i}`).innerText = item.steps[i-1];
                    // Зберігаємо поточний стан відкритих кроків при зміні мови!
                    if (i <= revealedSteps) {
                        document.getElementById(`s${i}`).style.display = 'block';
                        document.getElementById(`arr${i}`).style.display = 'block';
                    } else {
                        document.getElementById(`s${i}`).style.display = 'none';
                        document.getElementById(`arr${i}`).style.display = 'none';
                    }
                }
            }
        }

        function nextRound() {
            const list = localizedData[currentLang] || localizedData['en'];
            if (list.length === 0) return;

            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * list.length);
            } while (newIndex === currentIndex && list.length > 1);

            currentIndex = newIndex;
            revealedSteps = 0;
            
            const item = list[currentIndex];
            document.getElementById('b-start').innerText = item.start;
            document.getElementById('b-end').innerText = item.end;
            
            for (let i = 1; i <= 3; i++) {
                document.getElementById(`s${i}`).innerText = item.steps[i-1];
                document.getElementById(`s${i}`).style.display = 'none';
                document.getElementById(`arr${i}`).style.display = 'none';
            }
            document.getElementById('arr-final').style.display = 'block';
            document.getElementById('btn-reveal').style.display = 'block';
        }

        function revealLogic() {
            if (revealedSteps < 3) {
                revealedSteps++;
                document.getElementById(`s${revealedSteps}`).style.display = 'block';
                document.getElementById(`arr${revealedSteps}`).style.display = 'block';
                
                if (revealedSteps === 3) {
                    document.getElementById('btn-reveal').style.display = 'none';
                }
            }
        }

        window.onload = function() {
            currentLang = localStorage.getItem('prybambas_lang') || 'en';
            document.getElementById('lang-selector').value = currentLang;
            changeLang();
        }
    </script>
</body>
</html>
