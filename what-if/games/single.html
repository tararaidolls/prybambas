<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Single Question | What If?</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --magenta: #d92cff;
            --bg: #020617;
            --yellow: #ff9f43;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: white; font-family: 'Nunito', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* Уніфікована панель вгорі */
        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            padding: 15px 15px 0 15px;
            z-index: 100;
        }

        .back-btn {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--magenta);
            color: white; 
            padding: 8px 16px; 
            border-radius: 50px;
            text-decoration: none; 
            font-weight: bold; 
            box-shadow: 0 0 10px rgba(217, 44, 255, 0.3); 
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }
        .back-btn:hover { background: rgba(217, 44, 255, 0.2); }

        .lang-switch {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--magenta);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 10px rgba(217, 44, 255, 0.3);
            font-weight: bold;
        }

        /* Логотип серії */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        
        .logo-svg {
            width: 35px;
            height: 35px;
            filter: drop-shadow(0 0 8px var(--magenta));
        }

        .logo-text {
            color: white;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 1.3rem;
            text-shadow: 0 0 10px var(--magenta);
        }

        /* ГОЛОВНИЙ ЕКРАН */
        .main-card {
            width: 90%; max-width: 450px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 2px solid var(--magenta);
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 15px rgba(217, 44, 255, 0.1);
            display: flex; flex-direction: column; align-items: center;
            min-height: 520px;
        }

        header h1 {
            font-size: 1.25rem; font-weight: 800; color: white; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;
            text-align: center;
        }

        .card { 
            background: rgba(15, 23, 42, 0.7); 
            border: 2.5px solid var(--magenta); 
            border-radius: 20px; 
            padding: 30px; 
            width: 100%; 
            text-align: center; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 15px rgba(217, 44, 255, 0.1);
            aspect-ratio: 3.5 / 4.5;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 20px;
        }
        .question { font-size: 1.35rem; font-weight: 800; line-height: 1.4; color: white; }
        
        .btn-group { display: flex; gap: 12px; width: 100%; }
        
        .action-btn { 
            flex: 1;
            background: transparent; 
            border: 2px solid var(--magenta); 
            color: white; 
            padding: 14px; 
            border-radius: 14px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .action-btn:hover { background: var(--magenta); color: #020617; box-shadow: 0 0 15px rgba(217, 44, 255, 0.4); }
        .action-btn.timer-btn { border-color: #ff9f43; color: #ff9f43; }
        .action-btn.timer-btn:hover { background: #ff9f43; color: #020617; box-shadow: 0 0 15px rgba(255, 159, 67, 0.4); }
        
        /* КРАСИВИЙ ПОВНОЕКРАННИЙ ТАЙМЕР ОВЕРЛЕЙ (No overlap UX fix) */
        #timer-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }

        #timer-text {
            font-size: 10rem;
            font-weight: 800;
            color: var(--yellow);
            text-shadow: 0 0 35px rgba(255, 159, 67, 0.7);
            margin-bottom: 20px;
        }

        #timer-sub {
            font-size: 1.2rem;
            font-weight: bold;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UPSELL BANNER (Inlined inside main-card to remain style stable) */
        .promo-banner {
            margin-top: 20px; 
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%); 
            border-radius: 16px;
            padding: 12px 18px; 
            width: 100%; 
            border: 2px solid var(--magenta); 
            box-shadow: 0 0 12px rgba(217, 44, 255, 0.2);
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            text-decoration: none; 
            color: white;
            transition: 0.3s;
        }
        .promo-banner:hover {
            transform: scale(1.02);
            box-shadow: 0 0 18px rgba(217, 44, 255, 0.4);
        }
        .promo-text h3 { margin: 0 0 3px 0; font-size: 0.95rem; color: var(--magenta); font-weight:800; text-transform: uppercase; }
        .promo-text p { margin: 0; font-size: 0.8rem; color: #cbd5e1; line-height: 1.3; }
        .promo-btn { 
            background: var(--magenta); 
            color: white; 
            padding: 8px 14px; 
            border-radius: 30px; 
            font-size: 0.75rem; 
            font-weight: 900; 
            white-space: nowrap; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Уніфікована панель вгорі -->
    <div class="top-bar">
        <a href="../index.html" class="back-btn" id="btn-back">← Hub</a>
        <select class="lang-switch" id="lang-selector" onchange="changeLang()">
            <option value="en">🇺🇸 EN</option>
            <option value="uk">🇺🇦 UK</option>
            <option value="es">🇪🇸 ES</option>
            <option value="de">🇩🇪 DE</option>
            <option value="fr">🇫🇷 FR</option>
            <option value="nl">🇳🇱 NL</option>
            <option value="da">🇩🇰 DA</option>
            <option value="sv">🇸🇪 SV</option>
            <option value="ro">🇷🇴 RO</option>
            <option value="pl">🇵🇱 PL</option>
            <option value="pt">🇧🇷 PT</option>
        </select>
    </div>

    <!-- Логотип серії -->
    <div class="logo-container">
        <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 20 C25 20 20 50 50 80 C80 50 75 20 50 20 Z" stroke="var(--magenta)" stroke-width="4" stroke-linejoin="round" />
            <circle cx="50" cy="45" r="10" stroke="white" stroke-width="3" />
        </svg>
        <span class="logo-text">WHAT IF?</span>
    </div>

    <div class="main-card">
        <header>
            <h1 id="scr-title">Single Question</h1>
        </header>
        
        <div class="card">
            <div class="question" id="q-text">Tap 'Next' to start!</div>
        </div>
        
        <div class="btn-group">
            <button class="action-btn timer-btn" id="btn-timer" onclick="startTimer()">⏳ 60s</button>
            <button class="action-btn" id="btn-next" onclick="nextQuestion()">NEXT ➔</button>
        </div>

        <!-- РЕКЛАМНИЙ БАНЕР / Пропозиція Книги (Upsell) -->
        <a href="https://www.amazon.com/dp/B0BRC7Z2NW" class="promo-banner" target="_blank">
            <div class="promo-text">
                <h3 id="promo-title">Offline Brain Fitness</h3>
                <p id="promo-subtitle">Get the physical "What If?" workbook with 100+ logical puzzles to build critical thinking away from screens.</p>
            </div>
            <div class="promo-btn" id="promo-btn-lbl">Get Book</div>
        </a>
    </div>
    
    <!-- ТАЙМЕР ОВЕРЛЕЙ (UX FIX) -->
    <div id="timer-overlay" onclick="stopTimer()">
        <div id="timer-text">60</div>
        <div id="timer-sub" class="timer-sub-lbl">Tap anywhere to close</div>
    </div>

    <!-- Підключаємо зовнішні файли контенту для легкої локалізації -->
    <script src="../content/en.js"></script>
    <script src="../content/uk.js"></script>
    <script src="../content/ro.js"></script>

    <script>
        // Об'єднана база даних, яка автоматично підхоплює мови з файлів у папці /content
        const localizedData = {
            en: typeof whatif_single_en !== 'undefined' ? whatif_single_en : [],
            uk: typeof whatif_single_uk !== 'undefined' ? whatif_single_uk : [],
            ro: typeof whatif_single_ro !== 'undefined' ? whatif_single_ro : []
        };

        const translationDict = {
            en: {
                title: "Single Question",
                next: "NEXT ➔",
                promo_t: "Offline Brain Fitness",
                promo_st: "Get the physical 'What If?' workbook with 100+ logical puzzles to build critical thinking away from screens.",
                promo_btn: "Get Book",
                back: "← Hub",
                tap_to_close: "Tap anywhere to close",
                ready: "Tap 'Next' to start!"
            },
            uk: {
                title: "Одне Питання",
                next: "Наступна ➔",
                promo_t: "Розумний відпочинок",
                promo_st: "Отримайте велику книгу логічних ланцюжків 'Що, якби?' на Amazon! 100+ завдань для розвитку мислення без екранів.",
                promo_btn: "Купити",
                back: "← Хаб",
                tap_to_close: "Торкніться будь-де, щоб закрити",
                ready: "Натисніть 'Наступна', щоб почати!"
            },
            ro: {
                title: "O Singură Întrebare",
                next: "Următoarea ➔",
                promo_t: "Fitness Cerebral Offline",
                promo_st: "Cumpără volumul fizic 'What If?' cu peste 100 de puzzle-uri de logică pentru dezvoltarea gândirii critice fără ecrane.",
                promo_btn: "Cumpără",
                back: "← Hub",
                tap_to_close: "Atinge oriunde pentru a închide",
                ready: "Apasă pe 'Următoarea' pentru a începe!"
            }
        };

        let currentLang = 'en';
        let currentIndex = -1;
        let timerVal = 60;
        let timerInterval;
        
        function changeLang() {
            currentLang = document.getElementById('lang-selector').value;
            localStorage.setItem('prybambas_lang', currentLang);
            
            // Apply UI Translations
            const ui = translationDict[currentLang] || translationDict['en'];
            document.getElementById('scr-title').innerText = ui.title;
            document.getElementById('btn-next').innerText = ui.next;
            document.getElementById('promo-title').innerText = ui.promo.t;
            document.getElementById('promo-subtitle').innerText = ui.promo.st;
            document.getElementById('promo-btn-lbl').innerText = ui.promo.btn;
            document.getElementById('btn-back').innerText = ui.back;
            document.querySelector('.timer-sub-lbl').innerText = ui.tap_to_close;

            // Якщо гра ще не почалася, показуємо вітальне повідомлення цією мовою
            if (currentIndex === -1) {
                document.getElementById('q-text').innerText = ui.ready;
            } else {
                // Перекладаємо ПОТОЧНЕ питання на льоту! (UX FIX)
                const questions = localizedData[currentLang] || localizedData['en'];
                if (questions.length > 0) {
                    // Страхуємось на випадок якщо масиви різної довжини
                    const safeIndex = currentIndex % questions.length;
                    document.getElementById('q-text').innerText = questions[safeIndex];
                }
            }
        }

        function nextQuestion() {
            // Беремо контент відповідно до обраної мови з підтримкою фоллбеку (Fallback)
            const questions = localizedData[currentLang] || localizedData['en'];
            if (questions.length === 0) return;

            // Випадковий вибір без повторень підряд
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * questions.length);
            } while (newIndex === currentIndex && questions.length > 1);

            currentIndex = newIndex;
            document.getElementById('q-text').innerText = questions[currentIndex];
        }

        function startTimer() {
            const overlay = document.getElementById('timer-overlay');
            const text = document.getElementById('timer-text');
            
            overlay.style.display = "flex";
            timerVal = 60;
            text.innerText = timerVal;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerVal--;
                text.innerText = timerVal;
                
                if (timerVal <= 0) {
                    stopTimer();
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer-overlay').style.display = "none";
        }

        window.onload = function() {
            currentLang = localStorage.getItem('prybambas_lang') || 'en';
            document.getElementById('lang-selector').value = currentLang;
            changeLang();
        }
    </script>
</body>
</html>
