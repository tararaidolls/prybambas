<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Одне запитання | What If?</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --magenta: #d92cff;
            --bg: #020617;
            --yellow: #ff9f43;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: white; font-family: 'Nunito', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* Уніфікована панель вгорі */
        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            padding: 15px 15px 0 15px;
            z-index: 100;
        }

        .back-btn {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--magenta);
            color: white; 
            padding: 8px 16px; 
            border-radius: 50px;
            text-decoration: none; 
            font-weight: bold; 
            box-shadow: 0 0 10px rgba(217, 44, 255, 0.3); 
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }
        .back-btn:hover { background: rgba(217, 44, 255, 0.2); }

        .lang-switch {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--magenta);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 10px rgba(217, 44, 255, 0.3);
            font-weight: bold;
        }

        /* Логотип серії */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        
        .logo-svg {
            width: 35px;
            height: 35px;
            filter: drop-shadow(0 0 8px var(--magenta));
        }

        .logo-text {
            color: white;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 1.3rem;
            text-shadow: 0 0 10px var(--magenta);
        }

        /* ГОЛОВНИЙ ЕКРАН */
        .main-card {
            width: 90%; max-width: 450px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 2px solid var(--magenta);
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 15px rgba(217, 44, 255, 0.1);
            display: flex; flex-direction: column; align-items: center;
            min-height: 520px;
        }

        header h1 {
            font-size: 1.25rem; font-weight: 800; color: white; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;
            text-align: center;
        }

        .card { 
            background: rgba(15, 23, 42, 0.7); 
            border: 2.5px solid var(--magenta); 
            border-radius: 20px; 
            padding: 30px; 
            width: 100%; 
            text-align: center; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 15px rgba(217, 44, 255, 0.1);
            aspect-ratio: 3.5 / 4.5;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 20px;
        }
        .question { font-size: 1.35rem; font-weight: 800; line-height: 1.4; color: white; }
        
        .btn-group { display: flex; gap: 12px; width: 100%; }
        
        .action-btn { 
            flex: 1;
            background: transparent; 
            border: 2px solid var(--magenta); 
            color: white; 
            padding: 14px; 
            border-radius: 14px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .action-btn:hover { background: var(--magenta); color: #020617; box-shadow: 0 0 15px rgba(217, 44, 255, 0.4); }
        .action-btn.timer-btn { border-color: #ff9f43; color: #ff9f43; }
        .action-btn.timer-btn:hover { background: #ff9f43; color: #020617; box-shadow: 0 0 15px rgba(255, 159, 67, 0.4); }
        
        /* КРАСИВИЙ ПОВНОЕКРАННИЙ ТАЙМЕР ОВЕРЛЕЙ (No overlap UX fix) */
        #timer-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }

        #timer-text {
            font-size: 10rem;
            font-weight: 800;
            color: var(--yellow);
            text-shadow: 0 0 35px rgba(255, 159, 67, 0.7);
            margin-bottom: 20px;
        }

        #timer-sub {
            font-size: 1.2rem;
            font-weight: bold;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UPSELL BANNER (Inlined inside main-card to remain style stable) */
        .promo-banner {
            margin-top: 20px; 
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%); 
            border-radius: 16px;
            padding: 12px 18px; 
            width: 100%; 
            border: 2px solid var(--magenta); 
            box-shadow: 0 0 12px rgba(217, 44, 255, 0.2);
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            text-decoration: none; 
            color: white;
            transition: 0.3s;
        }
        .promo-banner:hover {
            transform: scale(1.02);
            box-shadow: 0 0 18px rgba(217, 44, 255, 0.4);
        }
        .promo-text h3 { margin: 0 0 3px 0; font-size: 0.95rem; color: var(--magenta); font-weight:800; text-transform: uppercase; }
        .promo-text p { margin: 0; font-size: 0.8rem; color: #cbd5e1; line-height: 1.3; }
        .promo-btn { 
            background: var(--magenta); 
            color: white; 
            padding: 8px 14px; 
            border-radius: 30px; 
            font-size: 0.75rem; 
            font-weight: 900; 
            white-space: nowrap; 
            text-transform: uppercase;
        }
    </style>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="8460fd7f-da31-46c7-8c9d-eff5e64399cc"></script>

    <!-- ТАЙМЕР ОВЕРЛЕЙ (UX FIX) -->

        <div id="timer-sub" class="timer-sub-lbl">Торкніться будь-де, щоб закрити</div>
    </div>

    <!-- Підключаємо зовнішні файли контенту для легкої локалізації -->

            fi: typeof whatif_single_fi !== 'undefined' ? whatif_single_fi : [],
            da: typeof whatif_single_da !== 'undefined' ? whatif_single_da : [],
            es: typeof whatif_single_es !== 'undefined' ? whatif_single_es : [],
            pt: typeof whatif_single_pt !== 'undefined' ? whatif_single_pt : [],
            he: typeof whatif_single_he !== 'undefined' ? whatif_single_he : [],
            ja: typeof whatif_single_ja !== 'undefined' ? whatif_single_ja : [],
            ar: typeof whatif_single_ar !== 'undefined' ? whatif_single_ar : [],

                };

        const translationDict = {

            en: {
                title: "Single Question", next: "NEXT ➔",
                promo_t: "Smart Brain Workout", promo_st: "Get the physical 'What If?' workbook with 100+ logic puzzles for critical thinking without screens.", promo_btn: "Buy", back: "← Hub", tap_to_close: "Tap anywhere to close", ready: "Tap 'Next' to start!"
            },
            uk: {
                title: "Одне запитання", next: "ДАЛІ ➔",
                promo_t: "Розумна зарядка для мозку", promo_st: "Отримайте фізичний зошит 'What If?' із понад 100 логічними задачами для розвитку критичного мислення без екранів.", promo_btn: "Купити", back: "← Hub", tap_to_close: "Торкніться будь-де, щоб закрити", ready: "Торкніться 'Далі', щоб почати!"
            },
            ro: {
                title: "O Singură Întrebare", next: "URMĂTOAREA ➔",
                promo_t: "Antrenament Cerebral Offline", promo_st: "Cumpără caietul fizic 'What If?' cu peste 100 de puzzle-uri logice pentru gândire critică fără ecrane.", promo_btn: "Cumpără", back: "← Hub", tap_to_close: "Atinge oriunde pentru a închide", ready: "Apasă pe 'Următoarea' pentru a începe!"
            },
            pl: {
                title: "Jedno Pytanie", next: "DALEJ ➔",
                promo_t: "Trening Mózgu Offline", promo_st: "Kup papierowy zeszyt 'What If?' z ponad 100 łamigłówkami logicznymi, aby trenować myślenie krytyczne bez ekranów.", promo_btn: "Kup teraz", back: "← Hub", tap_to_close: "Dotknij w dowolnym miejscu, aby zamknąć", ready: "Dotknij 'Dalej', aby rozpocząć!"
            },
            de: {
                title: "Eine Einzige Frage", next: "WEITER ➔",
                promo_t: "Offline-Gehirn-Fitness", promo_st: "Hol dir das physische 'What If?'-Arbeitsbuch mit über 100 Logikrätseln, um kritisches Denken ohne Bildschirme zu trainieren.", promo_btn: "Kaufen", back: "← Hub", tap_to_close: "Tippe irgendwohin zum Schließen", ready: "Tippe auf 'Weiter', um zu starten!"
            },
            fr: {
                title: "Une Seule Question", next: "SUIVANT ➔",
                promo_t: "Gymnastique Cérébrale Offline", promo_st: "Obtenez le cahier physique 'What If?' avec plus de 100 énigmes logiques pour la pensée critique sans écrans.", promo_btn: "Acheter", back: "← Hub", tap_to_close: "Appuie n'importe où pour fermer", ready: "Appuie sur 'Suivant' pour commencer !"
            },
            it: {
                title: "Una Sola Domanda", next: "AVANTI ➔",
                promo_t: "Allenamento Cerebrale Offline", promo_st: "Ottieni il quaderno fisico 'What If?' con oltre 100 puzzle logici per il pensiero critico senza schermi.", promo_btn: "Acquista", back: "← Hub", tap_to_close: "Tocca ovunque per chiudere", ready: "Tocca 'Avanti' per iniziare!"
            },
            sv: {
                title: "En Enda Fråga", next: "NÄSTA ➔",
                promo_t: "Hjärnträning Offline", promo_st: "Skaffa den fysiska 'What If?'-boken med över 100 logikpussel för kritiskt tänkande utan skärmar.", promo_btn: "Köp", back: "← Hub", tap_to_close: "Tryck var som helst för att stänga", ready: "Tryck på 'Nästa' för att börja!"
            },
            fi: {
                title: "Yksittäinen Kysymys", next: "SEURAAVA ➔",
                promo_t: "Aivojumppa Offline", promo_st: "Hanki fyysinen 'What If?' -vihko yli 100 logiikka-arvoituksella kriittiseen ajatteluun ilman näyttöjä.", promo_btn: "Osta", back: "← Hub", tap_to_close: "Napauta missä tahansa sulkeaksesi", ready: "Napauta 'Seuraava' aloittaaksesi!"
            },
            da: {
                title: "Et Enkelt Spørgsmål", next: "NÆSTE ➔",
                promo_t: "Hjernetræning Offline", promo_st: "Få den fysiske 'What If?'-bog med over 100 logikgåder til kritisk tænkning uden skærme.", promo_btn: "Køb", back: "← Hub", tap_to_close: "Tryk hvor som helst for at lukke", ready: "Tryk på 'Næste' for at starte!"
            },
            es: {
                title: "Una Sola Pregunta", next: "SIGUIENTE ➔",
                promo_t: "Fitness Cerebral Offline", promo_st: "Consigue el cuaderno físico 'What If?' con más de 100 acertijos lógicos para entrenar el pensamiento crítico lejos de las pantallas.", promo_btn: "Comprar", back: "← Hub", tap_to_close: "Toca en cualquier lugar para cerrar", ready: "¡Toca 'Siguiente' para empezar!"
            },
            pt: {
                title: "Uma Única Pergunta", next: "PRÓXIMO ➔",
                promo_t: "Treino Cerebral Offline", promo_st: "Obtenha o caderno físico 'What If?' com mais de 100 quebra-cabeças lógicos para pensamento crítico sem telas.", promo_btn: "Comprar", back: "← Hub", tap_to_close: "Toque em qualquer lugar para fechar", ready: "Toque em 'Próximo' para começar!"
            },
            he: {
                title: "שאלה אחת", next: "הבא ➔",
                promo_t: "אימון מוח אופליין", promo_st: "קבלו את חוברת 'What If?' הפיזית עם יותר מ-100 חידות לוגיות לחשיבה ביקורתית בלי מסכים.", promo_btn: "קנו", back: "← Hub", tap_to_close: "הקש בכל מקום לסגירה", ready: "הקש על 'הבא' כדי להתחיל!"
            },
            ja: {
                title: "単一の質問", next: "次へ ➔",
                promo_t: "オフライン脳トレ", promo_st: "画面なしで批判的思考を鍛える100以上の論理パズル入り物理版『What If?』を手に入れよう。", promo_btn: "購入", back: "← Hub", tap_to_close: "どこでもタップして閉じる", ready: "「次へ」をタップして開始！"
            },
            ar: {
                title: "سؤال واحد", next: "التالي ➔",
                promo_t: "تمرين الدماغ دون اتصال", promo_st: "احصل على دفتر 'What If?' الورقي مع أكثر من 100 لغز منطقي للتفكير النقدي بدون شاشات.", promo_btn: "اشترِ", back: "← Hub", tap_to_close: "اضغط في أي مكان للإغلاق", ready: "اضغط «التالي» للبدء!"
            },

                };

        let currentLang = 'en';
        let currentIndex = -1;
        let timerVal = 60;
        let timerInterval;
        
        function changeLang() {
            currentLang = document.getElementById('lang-selector').value;
            localStorage.setItem('prybambas_lang', currentLang);
            
            // Apply UI Translations
            const ui = translationDict[currentLang] || translationDict['en'];
            document.getElementById('scr-title').innerText = ui.title;
            document.getElementById('btn-next').innerText = ui.next;
            document.getElementById('promo-title').innerText = ui.promo_t;
            document.getElementById('promo-subtitle').innerText = ui.promo_st;
            document.getElementById('promo-btn-lbl').innerText = ui.promo_btn;
            document.getElementById('btn-back').innerText = ui.back;
            document.querySelector('.timer-sub-lbl').innerText = ui.tap_to_close;

            // Якщо гра ще не почалася, показуємо вітальне повідомлення цією мовою
            if (currentIndex === -1) {
                document.getElementById('q-text').innerText = ui.ready;
            } else {
                // Перекладаємо ПОТОЧНЕ питання на льоту! (UX FIX)
                const questions = localizedData[currentLang] || localizedData['en'];
                if (questions.length > 0) {
                    // Страхуємось на випадок якщо масиви різної довжини
                    const safeIndex = currentIndex % questions.length;
                    document.getElementById('q-text').innerText = questions[safeIndex];
                }
            }
        }

        function nextQuestion() {
            // Беремо контент відповідно до обраної мови з підтримкою фоллбеку (Fallback)
            const questions = localizedData[currentLang] || localizedData['en'];
            if (questions.length === 0) return;

            // Випадковий вибір без повторень підряд
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * questions.length);
            } while (newIndex === currentIndex && questions.length > 1);

            currentIndex = newIndex;
            document.getElementById('q-text').innerText = questions[currentIndex];
        }

        function startTimer() {
            const overlay = document.getElementById('timer-overlay');
            const text = document.getElementById('timer-text');
            
            overlay.style.display = "flex";
            timerVal = 60;
            text.innerText = timerVal;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerVal--;
                text.innerText = timerVal;
                
                if (timerVal <= 0) {
                    stopTimer();
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer-overlay').style.display = "none";
        }

        window.onload = function() {
            currentLang = localStorage.getItem('prybambas_lang') || 'en';
            document.getElementById('lang-selector').value = currentLang;
            changeLang();
        }
    </script>
</body>
</html>
