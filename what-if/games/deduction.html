<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deduction | What If?</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --magenta: #d92cff;
            --cyan: #00f3ff;
            --bg: #020617;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: white; font-family: 'Nunito', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* Уніфікована панель вгорі */
        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            padding: 15px 15px 0 15px;
            z-index: 100;
        }

        .back-btn {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--magenta);
            color: white; 
            padding: 8px 16px; 
            border-radius: 50px;
            text-decoration: none; 
            font-weight: bold; 
            box-shadow: 0 0 10px rgba(217, 44, 255, 0.3); 
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }
        .back-btn:hover { background: rgba(217, 44, 255, 0.2); }

        .lang-switch {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--magenta);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 10px rgba(217, 44, 255, 0.3);
            font-weight: bold;
        }

        /* Логотип серії */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        
        .logo-svg {
            width: 35px;
            height: 35px;
            filter: drop-shadow(0 0 8px var(--magenta));
        }

        .logo-text {
            color: white;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 1.3rem;
            text-shadow: 0 0 10px var(--magenta);
        }

        /* ГОЛОВНИЙ ЕКРАН */
        .main-card {
            width: 90%; max-width: 450px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 2px solid var(--magenta);
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 15px rgba(217, 44, 255, 0.1);
            display: flex; flex-direction: column; align-items: center;
            min-height: 520px;
        }

        header h1 {
            font-size: 1.25rem; font-weight: 800; color: white; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;
            text-align: center;
        }

        .card { 
            background: rgba(15, 23, 42, 0.7); 
            border: 2.5px solid #ff6b6b; 
            border-radius: 20px; 
            padding: 30px; 
            width: 100%; 
            text-align: center; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 107, 107, 0.15);
            aspect-ratio: 3.5 / 4.5;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            margin-bottom: 20px;
            gap: 15px;
            transition: 0.3s;
        }
        .card.revealed { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,243,255,0.3); }
        
        .label { color: #ff6b6b; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;}
        .label.revealed { color: var(--cyan); }
        
        .text { font-size: 1.35rem; font-weight: 800; line-height: 1.4; color: white; }
        
        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-top: auto; }
        .action-btn { 
            background: transparent; 
            border: 2px solid var(--cyan); 
            color: white; 
            padding: 14px; 
            border-radius: 14px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s; 
            width: 100%; 
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .action-btn:hover { background: var(--cyan); color: #020617; box-shadow: 0 0 15px rgba(0, 243, 255, 0.4); }

        /* UPSELL BANNER (Inlined inside main-card to remain style stable) */
        .promo-banner {
            margin-top: 20px; 
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%); 
            border-radius: 16px;
            padding: 12px 18px; 
            width: 100%; 
            border: 2px solid var(--magenta); 
            box-shadow: 0 0 12px rgba(217, 44, 255, 0.2);
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            text-decoration: none; 
            color: white;
            transition: 0.3s;
        }
        .promo-banner:hover {
            transform: scale(1.02);
            box-shadow: 0 0 18px rgba(217, 44, 255, 0.4);
        }
        .promo-text h3 { margin: 0 0 3px 0; font-size: 0.95rem; color: var(--magenta); font-weight:800; text-transform: uppercase; }
        .promo-text p { margin: 0; font-size: 0.8rem; color: #cbd5e1; line-height: 1.3; }
        .promo-btn { 
            background: var(--magenta); 
            color: white; 
            padding: 8px 14px; 
            border-radius: 30px; 
            font-size: 0.75rem; 
            font-weight: 900; 
            white-space: nowrap; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Уніфікована панель вгорі -->
    <div class="top-bar">
        <a href="../index.html" class="back-btn" id="btn-back">← Hub</a>
        <select class="lang-switch" id="lang-selector" onchange="changeLang()">
            <option value="en">🇺🇸 EN</option>
            <option value="uk">🇺🇦 UK</option>
            <option value="es">🇪🇸 ES</option>
            <option value="de">🇩🇪 DE</option>
            <option value="fr">🇫🇷 FR</option>
            <option value="nl">🇳🇱 NL</option>
            <option value="da">🇩🇰 DA</option>
            <option value="sv">🇸🇪 SV</option>
            <option value="ro">🇷🇴 RO</option>
            <option value="pl">🇵🇱 PL</option>
            <option value="pt">🇧🇷 PT</option>
        </select>
    </div>

    <!-- Логотип серії -->
    <div class="logo-container">
        <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 20 C25 20 20 50 50 80 C80 50 75 20 50 20 Z" stroke="var(--magenta)" stroke-width="4" stroke-linejoin="round" />
            <circle cx="50" cy="45" r="10" stroke="white" stroke-width="3" />
        </svg>
        <span class="logo-text">WHAT IF?</span>
    </div>

    <div class="main-card">
        <header>
            <h1 id="scr-title">Deduction</h1>
        </header>
        
        <div class="card" id="card-box">
            <div class="label" id="lbl-status">FINAL CONSEQUENCE:</div>
            <div class="text" id="main-text">...</div>
        </div>
        
        <div class="btn-group">
            <button class="action-btn" id="btn-reveal" onclick="revealStart()">REVEAL ORIGINAL CAUSE</button>
            <button class="action-btn" id="btn-next" onclick="nextRound()" style="border-color:white;">NEXT ROUND ➔</button>
        </div>

        <!-- РЕКЛАМНИЙ БАНЕР / Пропозиція Книги (Upsell) -->
        <a href="https://www.amazon.com/dp/B0BRC7Z2NW" class="promo-banner" target="_blank">
            <div class="promo-text">
                <h3 id="promo-title">Offline Brain Fitness</h3>
                <p id="promo-subtitle">Get the physical "What If?" workbook with 100+ logical puzzles to build critical thinking away from screens.</p>
            </div>
            <div class="promo-btn" id="promo-btn-lbl">Get Book</div>
        </a>
    </div>

    <!-- Підключаємо зовнішні файли контенту для легкої локалізації -->
    <script src="../content/en.js"></script>
    <script src="../content/uk.js"></script>
    <script src="../content/ro.js"></script>

    <script>
        // Об'єднана база даних, яка автоматично підхоплює мови з файлів у папці /content
        const localizedData = {
            en: typeof whatif_deduction_en !== 'undefined' ? whatif_deduction_en : [],
            uk: typeof whatif_deduction_uk !== 'undefined' ? whatif_deduction_uk : [],
            ro: typeof whatif_deduction_ro !== 'undefined' ? whatif_deduction_ro : []
        };

        const translationDict = {
            en: {
                title: "Deduction",
                reveal: "REVEAL ORIGINAL CAUSE",
                lbl_consequence: "FINAL CONSEQUENCE:",
                lbl_cause: "ORIGINAL CAUSE:",
                next: "NEXT ROUND ➔",
                promo_t: "Offline Brain Fitness",
                promo_st: "Get the physical 'What If?' workbook with 100+ logical puzzles to build critical thinking away from screens.",
                promo_btn: "Get Book",
                back: "← Hub"
            },
            uk: {
                title: "Дедукція",
                reveal: "ВІДКРИТИ ПЕРШОПРИЧИНУ",
                lbl_consequence: "ФІНАЛЬНИЙ НАСЛІДОК:",
                lbl_cause: "ПЕРШОПРИЧИНА (СТАРТ):",
                next: "Наступний раунд ➔",
                promo_t: "Розумний відпочинок",
                promo_st: "Отримайте велику книгу логічних ланцюжків 'Що, якби?' на Amazon! 100+ завдань для розвитку мислення без екранів.",
                promo_btn: "Купити",
                back: "← Хаб"
            },
            ro: {
                title: "Deducție",
                reveal: "ARATĂ CAUZA INIȚIALĂ",
                lbl_consequence: "CONSECINȚA FINALĂ:",
                lbl_cause: "CAUZA INIȚIALĂ:",
                next: "Următorul raund ➔",
                promo_t: "Fitness Cerebral Offline",
                promo_st: "Cumpără volumul fizic 'What If?' cu peste 100 de puzzle-uri de logică pentru dezvoltarea gândirii critice fără ecrane.",
                promo_btn: "Cumpără",
                back: "← Hub"
            }
        };

        let currentLang = 'en';
        let currentIndex = -1;
        let isRevealed = false;
        
        function changeLang() {
            currentLang = document.getElementById('lang-selector').value;
            localStorage.setItem('prybambas_lang', currentLang);
            
            // Apply UI Translations
            const ui = translationDict[currentLang] || translationDict['en'];
            document.getElementById('scr-title').innerText = ui.title;
            document.getElementById('btn-reveal').innerText = ui.reveal;
            document.getElementById('btn-next').innerText = ui.next;
            document.getElementById('promo-title').innerText = ui.promo.t;
            document.getElementById('promo-subtitle').innerText = ui.promo.st;
            document.getElementById('promo-btn-lbl').innerText = ui.promo.btn;
            document.getElementById('btn-back').innerText = ui.back;

            // Оновлюємо поточне питання на льоту! (UX FIX - No more sync bugs)
            const list = localizedData[currentLang] || localizedData['en'];
            if (list.length > 0) {
                if (currentIndex === -1) {
                    currentIndex = Math.floor(Math.random() * list.length);
                }
                const safeIndex = currentIndex % list.length;
                const item = list[safeIndex];

                const lbl = document.getElementById('lbl-status');
                if (isRevealed) {
                    lbl.innerText = ui.lbl_cause;
                    document.getElementById('main-text').innerText = item.start;
                } else {
                    lbl.innerText = ui.lbl_consequence;
                    document.getElementById('main-text').innerText = item.end;
                }
            }
        }

        function nextRound() {
            const list = localizedData[currentLang] || localizedData['en'];
            if (list.length === 0) return;

            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * list.length);
            } while (newIndex === currentIndex && list.length > 1);

            currentIndex = newIndex;
            isRevealed = false;
            
            // Reset styles
            document.getElementById('card-box').classList.remove('revealed');
            
            const ui = translationDict[currentLang] || translationDict['en'];
            const lbl = document.getElementById('lbl-status');
            lbl.innerText = ui.lbl_consequence;
            lbl.classList.remove('revealed');
            
            document.getElementById('main-text').innerText = list[currentIndex].end;
            document.getElementById('btn-reveal').style.display = 'block';
        }

        function revealStart() {
            const list = localizedData[currentLang] || localizedData['en'];
            if (list.length === 0) return;

            isRevealed = true;
            document.getElementById('card-box').classList.add('revealed');
            
            const ui = translationDict[currentLang] || translationDict['en'];
            const lbl = document.getElementById('lbl-status');
            lbl.innerText = ui.lbl_cause;
            lbl.classList.add('revealed');
            
            document.getElementById('main-text').innerText = list[currentIndex].start;
            document.getElementById('btn-reveal').style.display = 'none';
        }

        window.onload = function() {
            currentLang = localStorage.getItem('prybambas_lang') || 'en';
            document.getElementById('lang-selector').value = currentLang;
            changeLang();
        }
    </script>
</body>
</html>
