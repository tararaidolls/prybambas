<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What If? | Prybambas</title>
    <style>
        :root {
            --magenta: #d92cff;
            --green: #54ff3a;
            --cyan: #00f3ff;
            --bg: #0b1224;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            min-height: 100vh;
            background-color: var(--bg); color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            overflow-x: hidden; display: flex; flex-direction: column; align-items: center;
        }

        .fixed-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('../bg-image.jpg'); 
            background-size: cover; background-position: center center; z-index: -1;
        }

        header {
            width: 90%; max-width: 800px; display: flex; justify-content: space-between; align-items: center;
            margin-top: 20px; z-index: 10;
        }

        .back-btn {
            background: rgba(10,15,30,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 50px;
            text-decoration: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); }

        h1 {
            letter-spacing: 2px; text-shadow: 0 0 15px var(--magenta); text-align: center; margin: 20px 0 5px 0; color: white;
            z-index: 10;
        }

        .subtitle {
            text-align: center; color: rgba(255,255,255,0.7); font-size: 1.1rem; margin-bottom: 30px; z-index: 10; padding: 0 20px;
        }

        #app-container {
            width: 90%; max-width: 500px; display: flex; flex-direction: column; align-items: center;
            z-index: 10; padding-bottom: 60px;
        }

        /* 3 ICONS SELECTOR */
        .mode-selectors {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; width: 100%;
        }

        .selector-btn {
            width: 80px; height: 80px; border-radius: 20px; font-size: 2.5rem;
            background: rgba(10,15,30,0.6); border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }

        .selector-btn:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); }

        /* ACTIVE STATES FOR ICONS */
        .selector-btn.active.magenta { border-color: var(--magenta); box-shadow: 0 0 20px rgba(217,44,255,0.4); background: rgba(217,44,255,0.15); filter: drop-shadow(0 0 5px var(--magenta)); }
        .selector-btn.active.green { border-color: var(--green); box-shadow: 0 0 20px rgba(84,255,58,0.4); background: rgba(84,255,58,0.15); filter: drop-shadow(0 0 5px var(--green)); }
        .selector-btn.active.cyan { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,243,255,0.4); background: rgba(0,243,255,0.15); filter: drop-shadow(0 0 5px var(--cyan)); }

        /* RULES & CTA CONTAINER (Hidden by default) */
        #rules-container {
            display: none; flex-direction: column; align-items: center; width: 100%;
            background: rgba(10,15,30,0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 2px solid white; border-radius: 25px; padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .rules-title { font-size: 1.4rem; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; }

        .rules-list { text-align: left; margin-bottom: 30px; color: rgba(255,255,255,0.9); font-size: 1rem; line-height: 1.4; width: 100%; }
        .rules-list div { margin-bottom: 12px; display: flex; gap: 10px; align-items: flex-start; }
        .rules-list span { font-size: 1.3rem; flex-shrink: 0; }

        .cta-btn {
            background: transparent; border: 2px solid white; color: white;
            padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s; width: 100%; text-align: center;
        }

        @media (max-width: 600px) {
            .selector-btn { width: 70px; height: 70px; font-size: 2rem; }
            .mode-selectors { gap: 15px; }
            #rules-container { padding: 25px 15px; }
        }
    </style>
</head>
<body>

    <div class="fixed-bg"></div>

    <header>
        <a href="https://tararaidolls.github.io/prybambas/index.html" class="back-btn" id="lbl-back">← Hub</a>
        <div id="lang-display" style="font-weight:bold; opacity:0.7;">🇺🇸 EN</div>
    </header>

    <h1>WHAT IF?</h1>
    <div class="subtitle" id="lbl-sub">Choose your game</div>

    <div id="app-container">
        
        <!-- 3 ICONS SELECTOR -->
        <div class="mode-selectors">
            <div class="selector-btn" id="btn-mode1" onclick="selectMode(1, 'magenta')">❓</div>
            <div class="selector-btn" id="btn-mode2" onclick="selectMode(2, 'green')">🔗</div>
            <div class="selector-btn" id="btn-mode3" onclick="selectMode(3, 'cyan')">🕵️</div>
        </div>

        <!-- RULES & CTA (DYNAMIC) -->
        <div id="rules-container">
            <div class="rules-title" id="rules-title">MODE TITLE</div>
            <div class="rules-list" id="rules-text"></div>
            <button class="cta-btn" id="cta-play" onclick="startGame()">PLAY</button>
        </div>

    </div>

    <script>
        const db = {
            en: {
                back: "← Hub", sub: "Choose your game", play: "PLAY NOW",
                modes: [
                    { title: "SINGLE QUESTION", rules: "<div><span>🗣️</span> Discuss what would happen if a crazy event occurred.</div><div><span>⏳</span> Use the timer for speed rounds!</div>" },
                    { title: "LOGICAL CHAIN", rules: "<div><span>🧐</span> Read the starting fact.</div><div><span>🧠</span> Guess the crazy ending.</div><div><span>🔗</span> Tap to reveal the hidden logical chain!</div>" },
                    { title: "DEDUCTION", rules: "<div><span>🕵️</span> Read the final crazy consequence.</div><div><span>🔄</span> Try to deduce what caused it.</div><div><span>💡</span> Tap to reveal the original event!</div>" }
                ]
            },
            uk: {
                back: "← Назад", sub: "Обери свою гру", play: "ПОЧАТИ ГРУ",
                modes: [
                    { title: "ОДНЕ ПИТАННЯ", rules: "<div><span>🗣️</span> Обговоріть, що сталося б у такій шаленій ситуації.</div><div><span>⏳</span> Використовуйте таймер для швидких раундів!</div>" },
                    { title: "ЛОГІЧНИЙ ЛАНЦЮЖОК", rules: "<div><span>🧐</span> Прочитай стартовий факт.</div><div><span>🧠</span> Спробуй вгадати фінал.</div><div><span>🔗</span> Натисни, щоб відкрити весь логічний ланцюжок!</div>" },
                    { title: "ДЕДУКЦІЯ", rules: "<div><span>🕵️</span> Прочитай фінальний шалений наслідок.</div><div><span>🔄</span> Застосуй дедукцію і вгадай причину.</div><div><span>💡</span> Натисни, щоб відкрити всю історію!</div>" }
                ]
            }
        };

        let currentLang = 'en';
        let currentMode = 0; // 1, 2, or 3

        window.onload = () => {
            currentLang = localStorage.getItem('prybambas_lang') || 'en';
            if (!db[currentLang]) currentLang = 'en';
            
            const flags = { en:"🇺🇸 EN", uk:"🇺🇦 UK" };
            document.getElementById('lang-display').innerText = flags[currentLang] || currentLang.toUpperCase();
            
            document.getElementById('lbl-back').innerText = db[currentLang].back;
            document.getElementById('lbl-sub').innerText = db[currentLang].sub;
        };

        function selectMode(modeNum, colorClass) {
            currentMode = modeNum;
            const t = db[currentLang];
            
            // Reset all buttons
            document.getElementById('btn-mode1').className = "selector-btn";
            document.getElementById('btn-mode2').className = "selector-btn";
            document.getElementById('btn-mode3').className = "selector-btn";
            
            // Activate clicked button
            document.getElementById('btn-mode' + modeNum).className = "selector-btn active " + colorClass;

            // Update Container
            const container = document.getElementById('rules-container');
            const title = document.getElementById('rules-title');
            const text = document.getElementById('rules-text');
            const btn = document.getElementById('cta-play');

            // Apply specific colors
            container.style.display = "flex";
            container.style.borderColor = `var(--${colorClass})`;
            container.style.boxShadow = `0 0 25px rgba(var(--${colorClass}-rgb, 255,255,255), 0.2)`;
            
            title.style.color = `var(--${colorClass})`;
            title.innerText = t.modes[modeNum - 1].title;
            text.innerHTML = t.modes[modeNum - 1].rules;
            
            btn.innerText = t.play;
            btn.style.borderColor = `var(--${colorClass})`;
            
            // Hover effect trick for CTA button based on color
            btn.onmouseover = () => { btn.style.background = `var(--${colorClass})`; btn.style.color = "var(--bg)"; };
            btn.onmouseout = () => { btn.style.background = "transparent"; btn.style.color = "white"; };
        }

        function startGame() {
            if (currentMode === 1) {
                window.location.href = "single.html";
            } else if (currentMode === 2) {
                window.location.href = "chain.html";
            } else if (currentMode === 3) {
                window.location.href = "deduction.html";
            }
        }
    </script>
</body>
</html>
