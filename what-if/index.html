<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>What If? Selector | Prybambas</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --magenta: #d92cff;
            --green: #54ff3a;
            --cyan: #00f3ff;
            --bg: #020617;
            --surface: rgba(15, 23, 42, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            min-height: 100vh;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: white;
            font-family: 'Nunito', sans-serif;
            overflow-x: hidden; display: flex; flex-direction: column; align-items: center;
        }

        /* Уніфікована панель вгорі */
        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            padding: 15px 15px 0 15px;
            z-index: 100;
        }

        .back-btn {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--magenta);
            color: white; 
            padding: 8px 16px; 
            border-radius: 50px;
            text-decoration: none; 
            font-weight: bold; 
            box-shadow: 0 0 10px rgba(217, 44, 255, 0.3); 
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }
        .back-btn:hover { background: rgba(217, 44, 255, 0.2); }

        .lang-switch {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--magenta);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 10px rgba(217, 44, 255, 0.3);
            font-weight: bold;
        }

        /* Логотип серії */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        
        .logo-svg {
            width: 35px;
            height: 35px;
            filter: drop-shadow(0 0 8px var(--magenta));
        }

        .logo-text {
            color: white;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 1.3rem;
            text-shadow: 0 0 10px var(--magenta);
        }

        /* ГОЛОВНИЙ ЕКРАН */
        .main-card {
            width: 90%; max-width: 450px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 2px solid var(--magenta);
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 15px rgba(217, 44, 255, 0.1);
            display: flex; flex-direction: column; align-items: center;
            min-height: 520px;
        }

        header h1 {
            font-size: 1.25rem; font-weight: 800; color: white; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;
            text-align: center;
        }

        /* 3 ICONS SELECTOR */
        .mode-selectors {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; width: 100%;
        }

        .selector-btn {
            width: 75px; height: 75px; border-radius: 20px; font-size: 2.2rem;
            background: rgba(10,15,30,0.6); border: 2.5px solid rgba(255,255,255,0.2);
            cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center;
        }
        .selector-btn:hover { transform: translateY(-3px); background: rgba(255,255,255,0.1); }

        .selector-btn.active.magenta { border-color: var(--magenta); box-shadow: 0 0 20px rgba(217,44,255,0.4); background: rgba(217,44,255,0.15); filter: drop-shadow(0 0 5px var(--magenta)); }
        .selector-btn.active.green { border-color: var(--green); box-shadow: 0 0 20px rgba(84,255,58,0.4); background: rgba(84,255,58,0.15); filter: drop-shadow(0 0 5px var(--green)); }
        .selector-btn.active.cyan { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,243,255,0.4); background: rgba(0,243,255,0.15); filter: drop-shadow(0 0 5px var(--cyan)); }

        /* RULES & CTA CONTAINER */
        #rules-container {
            display: none; flex-direction: column; align-items: center; width: 100%;
            background: rgba(10,15,30,0.8); border: 2px solid white; border-radius: 20px; padding: 25px 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease-in-out;
            flex-grow: 1;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .rules-title { font-size: 1.15rem; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; text-align: center; }

        .rules-list { text-align: left; margin-bottom: 25px; color: rgba(255,255,255,0.9); font-size: 0.95rem; line-height: 1.4; width: 100%; }
        .rules-list div { margin-bottom: 10px; display: flex; gap: 8px; align-items: flex-start; }
        .rules-list span { font-size: 1.2rem; flex-shrink: 0; }

        .cta-btn {
            background: transparent; border: 2.5px solid white; color: white;
            padding: 12px; border-radius: 50px; text-decoration: none; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px; font-size: 0.95rem; cursor: pointer;
            transition: 0.3s; width: 100%; text-align: center; margin-top: auto;
        }

        /* UPSELL BANNER (Inlined inside main-card to stay strictly styled) */
        .promo-banner {
            margin-top: 20px; 
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%); 
            border-radius: 16px;
            padding: 12px 18px; 
            width: 100%; 
            border: 2px solid var(--magenta); 
            box-shadow: 0 0 12px rgba(217, 44, 255, 0.2);
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            text-decoration: none; 
            color: white;
            transition: 0.3s;
        }
        .promo-banner:hover {
            transform: scale(1.02);
            box-shadow: 0 0 18px rgba(217, 44, 255, 0.4);
        }
        .promo-text h3 { margin: 0 0 3px 0; font-size: 0.95rem; color: var(--magenta); font-weight:800; text-transform: uppercase; }
        .promo-text p { margin: 0; font-size: 0.8rem; color: #cbd5e1; line-height: 1.3; }
        .promo-btn { 
            background: var(--magenta); 
            color: white; 
            padding: 8px 14px; 
            border-radius: 30px; 
            font-size: 0.75rem; 
            font-weight: 900; 
            white-space: nowrap; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Уніфікована панель вгорі -->
    <div class="top-bar">
        <a href="../index.html" class="back-btn" id="btn-back">← Hub</a>
        <select class="lang-switch" id="lang-selector" onchange="changeLang()">
            <option value="en">🇺🇸 EN</option>
            <option value="uk">🇺🇦 UK</option>
            <option value="es">🇪🇸 ES</option>
            <option value="de">🇩🇪 DE</option>
            <option value="fr">🇫🇷 FR</option>
            <option value="nl">🇳🇱 NL</option>
            <option value="da">🇩🇰 DA</option>
            <option value="sv">🇸🇪 SV</option>
            <option value="ro">🇷🇴 RO</option>
            <option value="pl">🇵🇱 PL</option>
            <option value="pt">🇧🇷 PT</option>
        </select>
    </div>

    <!-- Логотип серії -->
    <div class="logo-container">
        <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 20 C25 20 20 50 50 80 C80 50 75 20 50 20 Z" stroke="var(--magenta)" stroke-width="4" stroke-linejoin="round" />
            <circle cx="50" cy="45" r="10" stroke="white" stroke-width="3" />
        </svg>
        <span class="logo-text">WHAT IF?</span>
    </div>

    <div class="main-card">
        <header>
            <h1 id="lbl-sub">Choose your game</h1>
        </header>

        <!-- 3 ICONS SELECTOR -->
        <div class="mode-selectors">
            <div class="selector-btn" id="btn-mode1" onclick="selectMode(1, 'magenta')">❓</div>
            <div class="selector-btn" id="btn-mode2" onclick="selectMode(2, 'green')">🔗</div>
            <div class="selector-btn" id="btn-mode3" onclick="selectMode(3, 'cyan')">🕵️</div>
        </div>

        <!-- RULES & CTA (DYNAMIC) -->
        <div id="rules-container">
            <div class="rules-title" id="rules-title">MODE TITLE</div>
            <div class="rules-list" id="rules-text"></div>
            <button class="cta-btn" id="cta-play" onclick="startGame()">PLAY</button>
        </div>

        <!-- РЕКЛАМНИЙ БАНЕР / Пропозиція Книги (Upsell) -->
        <a href="https://www.amazon.com/dp/B0BRC7Z2NW" class="promo-banner" target="_blank">
            <div class="promo-text">
                <h3 id="promo-title">Offline Brain Fitness</h3>
                <p id="promo-subtitle">Get the physical "What If?" workbook with 100+ logical puzzles to build critical thinking away from screens.</p>
            </div>
            <div class="promo-btn" id="promo-btn-lbl">Get Book</div>
        </a>
    </div>

    <script>
        const db = {
            en: {
                back: "← Hub", sub: "Choose your game", play: "PLAY NOW",
                modes: [
                    { title: "SINGLE QUESTION", rules: "<div><span>🗣️</span> Discuss what would happen if a crazy event occurred.</div><div><span>⏳</span> Use the timer for speed rounds!</div>" },
                    { title: "LOGICAL CHAIN", rules: "<div><span>🧐</span> Read the starting fact.</div><div><span>🧠</span> Guess the crazy ending.</div><div><span>🔗</span> Tap to reveal the hidden logical chain!</div>" },
                    { title: "DEDUCTION", rules: "<div><span>🕵️</span> Read the final crazy consequence.</div><div><span>🔄</span> Try to deduce what caused it.</div><div><span>💡</span> Tap to reveal the original event!</div>" }
                ],
                promo: {
                    t: "Offline Brain Fitness",
                    st: "Get the physical 'What If?' workbook with 100+ logical puzzles to build critical thinking away from screens.",
                    btn: "Get Book",
                    backHub: "← Hub"
                }
            },
            uk: {
                back: "← Назад", sub: "Обери свою гру", play: "ПОЧАТИ ГРУ",
                modes: [
                    { title: "ОДНЕ ПИТАННЯ", rules: "<div><span>🗣️</span> Обговоріть, що сталося б у такій шаленій ситуації.</div><div><span>⏳</span> Використовуйте таймер для швидких раундів!</div>" },
                    { title: "ЛОГІЧНИЙ ЛАНЦЮЖОК", rules: "<div><span>🧐</span> Прочитай стартовий факт.</div><div><span>🧠</span> Спробуй вгадати фінал.</div><div><span>🔗</span> Натисни, щоб відкрити весь логічний ланцюжок!</div>" },
                    { title: "ДЕДУКЦІЯ", rules: "<div><span>🕵️</span> Прочитай фінальний шалений наслідок.</div><div><span>🔄</span> Застосуй дедукцію і вгадай причину.</div><div><span>💡</span> Натисни, щоб відкрити всю історію!</div>" }
                ],
                promo: {
                    t: "Розумний відпочинок",
                    st: "Отримайте велику книгу логічних ланцюжків 'Що, якби?' на Amazon! 100+ завдань для розвитку мислення без екранів.",
                    btn: "Купити",
                    backHub: "← Хаб"
                }
            }
        };

        let currentLang = 'en';
        let currentMode = 0; // 1, 2, or 3

        function changeLang() {
            currentLang = document.getElementById('lang-selector').value;
            localStorage.setItem('prybambas_lang', currentLang);
            
            const t = db[currentLang] || db['en'];
            document.getElementById('btn-back').innerText = t.back;
            document.getElementById('lbl-sub').innerText = t.sub;
            document.getElementById('promo-title').innerText = t.promo.t;
            document.getElementById('promo-subtitle').innerText = t.promo.st;
            document.getElementById('promo-btn-lbl').innerText = t.promo.btn;

            if (currentMode > 0) {
                selectMode(currentMode, currentMode === 1 ? 'magenta' : (currentMode === 2 ? 'green' : 'cyan'));
            }
        }

        function selectMode(modeNum, colorClass) {
            currentMode = modeNum;
            const t = db[currentLang] || db['en'];
            
            // Reset all buttons
            document.getElementById('btn-mode1').className = "selector-btn";
            document.getElementById('btn-mode2').className = "selector-btn";
            document.getElementById('btn-mode3').className = "selector-btn";
            
            // Activate clicked button
            document.getElementById('btn-mode' + modeNum).className = "selector-btn active " + colorClass;

            // Update Container
            const container = document.getElementById('rules-container');
            const title = document.getElementById('rules-title');
            const text = document.getElementById('rules-text');
            const btn = document.getElementById('cta-play');

            // Apply specific colors
            container.style.display = "flex";
            container.style.borderColor = `var(--${colorClass})`;
            container.style.boxShadow = `0 0 15px rgba(var(--${colorClass}-rgb, 255,255,255), 0.1)`;
            
            title.style.color = `var(--${colorClass})`;
            title.innerText = t.modes[modeNum - 1].title;
            text.innerHTML = t.modes[modeNum - 1].rules;
            
            btn.innerText = t.play;
            btn.style.borderColor = `var(--${colorClass})`;
            
            // Hover effect trick for CTA button based on color
            btn.onmouseover = () => { btn.style.background = `var(--${colorClass})`; btn.style.color = "var(--bg)"; };
            btn.onmouseout = () => { btn.style.background = "transparent"; btn.style.color = "white"; };
        }

        function startGame() {
            if (currentMode === 1) window.location.href = "./games/single.html";
            else if (currentMode === 2) window.location.href = "./games/chain.html";
            else if (currentMode === 3) window.location.href = "./games/deduction.html";
        }

        window.onload = function() {
            currentLang = localStorage.getItem('prybambas_lang') || 'en';
            document.getElementById('lang-selector').value = currentLang;
            changeLang();
            // Default select second mode (Logical Chain)
            selectMode(2, 'green');
        }
    </script>
</body>
</html>
