<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prybambas Educational Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --magenta: #d92cff;
            --green: #54ff3a;
            --cyan: #00f3ff;
            --yellow: #ff9f43;
            --bg: #020617;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: white;
            font-family: 'Nunito', sans-serif;
            overflow-x: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Уніфікована панель вгорі */
        .top-bar {
            position: absolute; top: 15px; right: 15px; z-index: 100;
        }

        .lang-switch {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--cyan);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            font-weight: bold;
        }

        /* ЛОГОТИП СЕРІЇ */
        .logo-container {
            display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 30px;
        }
        
        .logo-svg {
            width: 70px; height: 70px;
            filter: drop-shadow(0 0 12px var(--cyan));
        }

        .logo-text {
            color: white; font-weight: 800; letter-spacing: 4px; font-size: 1.8rem;
            text-shadow: 0 0 12px var(--cyan);
        }

        /* СІТКА КНОПОК */
        .grid-container {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px;
            width: 90%; max-width: 440px; padding: 10px;
        }

        .space-btn {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            aspect-ratio: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-decoration: none; font-weight: 800; font-size: 1.05rem;
            transition: 0.3s; gap: 12px; cursor: pointer; text-align: center;
            padding: 10px;
        }

        .space-btn .icon { font-size: 2.8rem; transition: 0.3s; }

        /* Кольорові теми для кнопок */
        .btn-whatif { border: 2.5px solid var(--magenta); box-shadow: 0 0 10px rgba(217, 44, 255, 0.2); }
        .btn-whatif:hover {
            background: rgba(217, 44, 255, 0.1); transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(217, 44, 255, 0.5);
        }
        .btn-whatif:hover .icon { filter: drop-shadow(0 0 8px var(--magenta)); }

        .btn-inventor { border: 2.5px solid var(--green); box-shadow: 0 0 10px rgba(84, 255, 58, 0.2); }
        .btn-inventor:hover {
            background: rgba(84, 255, 58, 0.1); transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(84, 255, 58, 0.5);
        }
        .btn-inventor:hover .icon { filter: drop-shadow(0 0 8px var(--green)); }

        .btn-books { border: 2.5px solid var(--yellow); box-shadow: 0 0 10px rgba(255, 159, 67, 0.2); }
        .btn-books:hover {
            background: rgba(255, 159, 67, 0.1); transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(255, 159, 67, 0.5);
        }
        .btn-books:hover .icon { filter: drop-shadow(0 0 8px var(--yellow)); }

        .btn-coach { border: 2.5px solid var(--cyan); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
        .btn-coach:hover {
            background: rgba(0, 243, 255, 0.1); transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }
        .btn-coach:hover .icon { filter: drop-shadow(0 0 8px var(--cyan)); }
    </style>
</head>
<body>

    <!-- Уніфікована панель вгорі -->
    <div class="top-bar">
        <select class="lang-switch" id="lang-selector" onchange="changeLang()">
            <option value="en">🇺🇸 EN</option>
            <option value="uk">🇺🇦 UK</option>
            <option value="es">🇪🇸 ES</option>
            <option value="de">🇩🇪 DE</option>
            <option value="fr">🇫🇷 FR</option>
            <option value="nl">🇳🇱 NL</option>
            <option value="da">🇩🇰 DA</option>
            <option value="sv">🇸🇪 SV</option>
            <option value="ro">🇷🇴 RO</option>
            <option value="pl">🇵🇱 PL</option>
            <option value="pt">🇧🇷 PT</option>
        </select>
    </div>

    <!-- Логотип серії -->
    <div class="logo-container">
        <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="40" stroke="var(--cyan)" stroke-width="4" stroke-dasharray="10 6" />
            <path d="M50 20 L50 80 M20 50 L80 50" stroke="white" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">PRYBAMBAS</span>
    </div>

    <!-- Сітка просторів -->
    <div class="grid-container">
        <!-- 1. What If -->
        <a href="./what-if/index.html" class="space-btn btn-whatif">
            <span class="icon">🦋</span>
            <span id="lbl-whatif">What If?</span>
        </a>

        <!-- 2. Inventor Lab -->
        <a href="./inventor/index.html" class="space-btn btn-inventor">
            <span class="icon">⚙️</span>
            <span id="lbl-inventor">Inventor Lab</span>
        </a>

        <!-- 3. Books Gym -->
        <a href="./book/index.html" class="space-btn btn-books">
            <span class="icon">📚</span>
            <span id="lbl-books">Books Gym</span>
        </a>

        <!-- 4. AI Coach -->
        <a href="./coach/index.html" class="space-btn btn-coach">
            <span class="icon">🤖</span>
            <span id="lbl-coach">AI Coach</span>
        </a>
    </div>

    <script>
        const dict = {
            en: {
                whatif: "What If? Game",
                inventor: "Inventor Lab",
                books: "Books Gym",
                coach: "AI Coach"
            },
            uk: {
                whatif: "Гра 'Що, якби?'",
                inventor: "Лабораторія ТРВЗ",
                books: "Зал Книг",
                coach: "ШІ Тренер"
            }
        };

        function changeLang() {
            const lang = document.getElementById('lang-selector').value;
            localStorage.setItem('prybambas_lang', lang);
            
            const t = dict[lang] || dict['en'];
            document.getElementById('lbl-whatif').innerText = t.whatif;
            document.getElementById('lbl-inventor').innerText = t.inventor;
            document.getElementById('lbl-books').innerText = t.books;
            document.getElementById('lbl-coach').innerText = t.coach;
        }

        window.onload = function() {
            const savedLang = localStorage.getItem('prybambas_lang') || 'en';
            document.getElementById('lang-selector').value = savedLang;
            changeLang();
        }
    </script>
</body>
</html>
