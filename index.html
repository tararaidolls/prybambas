        :root {
            --magenta: #d92cff;
            --green: #54ff3a;
            --cyan: #00f3ff;
            --yellow: #ff9f43;
            --bg: #020617;
            --surface: rgba(15, 23, 42, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background-color: var(--bg);
            /* СТАБІЛЬНИЙ, СТАТИЧНИЙ КОСМІЧНИЙ БЕКГРАУНД (No Jumps on mobile) */
            background-image: 
                radial-gradient(circle at center, rgba(15, 23, 42, 0.8) 0%, #020617 100%),
                linear-gradient(rgba(0, 243, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.025) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            background-attachment: fixed;
            color: white;
            font-family: 'Nunito', sans-serif;
            overflow-x: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Уніфікована панель вгорі */
        .top-bar {
            position: absolute; top: 15px; right: 15px; z-index: 100;
            display: flex; gap: 10px; align-items: center;
        }

        .lang-switch {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--cyan);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            font-weight: bold;
        }

        /* Стильна кнопка встановлення додатку */
        .install-btn {
            background: linear-gradient(135deg, var(--cyan) 0%, #00bcff 100%);
            border: none;
            color: black;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 800;
            cursor: pointer;
            display: none; /* Показується тільки коли PWA готовий до встановлення */
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.5);
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: pulse-glow 2s infinite;
        }
        .install-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 18px var(--cyan);
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px rgba(0, 243, 255, 0.4); }
            50% { box-shadow: 0 0 20px rgba(0, 243, 255, 0.8); }
            100% { box-shadow: 0 0 10px rgba(0, 243, 255, 0.4); }
        }

        /* Діалогове вікно-інструкція для iOS (iPhone) */
        .ios-modal {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 380px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2.5px solid var(--cyan);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 20px rgba(0, 243, 255, 0.2);
            z-index: 1000;
            display: none;
            flex-direction: column; gap: 12px;
            animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slide-up {
            from { transform: translate(-50%, 100px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .ios-modal h3 { font-size: 1.1rem; color: var(--cyan); font-weight: 800; text-align: center; }
        .ios-modal p { font-size: 0.9rem; line-height: 1.4; color: #cbd5e1; text-align: center; }
        .ios-modal-step {
            display: flex; align-items: center; gap: 10px; background: rgba(2, 6, 23, 0.6);
            padding: 10px 15px; border-radius: 14px; border: 1px solid rgba(0, 243, 255, 0.1);
            font-size: 0.85rem; font-weight: 700;
        }
        .ios-modal-step span.icon { font-size: 1.3rem; }
        .ios-modal-close {
            background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px;
            border-radius: 12px; font-weight: bold; cursor: pointer; text-align: center; font-size: 0.85rem;
            transition: 0.2s; margin-top: 5px;
        }
        .ios-modal-close:hover { background: rgba(255,255,255,0.2); }

        /* ЛОГОТИП СЕРІЇ */
        .logo-container {
            display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 30px;
            margin-top: 50px;
        }
        
        .logo-img {
            width: 75px; height: 75px;
            border-radius: 20px;
            border: 2px solid var(--cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
            object-fit: cover;
        }

        .logo-text {
            color: white; font-weight: 800; letter-spacing: 4px; font-size: 1.8rem;
            text-shadow: 0 0 12px var(--cyan);
        }

        /* СІТКА КНОПОК */
        .grid-container {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px;
            width: 90%; max-width: 440px; padding: 10px;
            margin-bottom: 50px;
        }

        .space-btn {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            aspect-ratio: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-decoration: none; font-weight: 800; font-size: 1.05rem;
            transition: 0.3s; gap: 12px; cursor: pointer; text-align: center;
            padding: 15px;
        }

        .space-btn svg { width: 55px; height: 55px; transition: 0.3s; }

        /* Кольорові теми для кнопок із фірмовими SVG іконками */
        .btn-whatif { border: 2.5px solid var(--magenta); box-shadow: 0 0 10px rgba(217, 44, 255, 0.15); }
        .btn-whatif svg { filter: drop-shadow(0 0 6px rgba(217, 44, 255, 0.4)); }
        .btn-whatif:hover {
            background: rgba(217, 44, 255, 0.1); transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(217, 44, 255, 0.45);
        }
        .btn-whatif:hover svg { transform: scale(1.1); filter: drop-shadow(0 0 10px var(--magenta)); }

        .btn-inventor { border: 2.5px solid var(--green); box-shadow: 0 0 10px rgba(84, 255, 58, 0.15); }
        .btn-inventor svg { filter: drop-shadow(0 0 6px rgba(84, 255, 58, 0.4)); }
        .btn-inventor:hover {
            background: rgba(84, 255, 58, 0.1); transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(84, 255, 58, 0.45);
        }
        .btn-inventor:hover svg { transform: scale(1.1) rotate(45deg); filter: drop-shadow(0 0 10px var(--green)); }

        .btn-books { border: 2.5px solid var(--yellow); box-shadow: 0 0 10px rgba(255, 159, 67, 0.15); }
        .btn-books svg { filter: drop-shadow(0 0 6px rgba(255, 159, 67, 0.4)); }
        .btn-books:hover {
            background: rgba(255, 159, 67, 0.1); transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(255, 159, 67, 0.45);
        }
        .btn-books:hover svg { transform: scale(1.1); filter: drop-shadow(0 0 10px var(--yellow)); }

        .btn-coach { border: 2.5px solid var(--cyan); box-shadow: 0 0 10px rgba(0, 243, 255, 0.15); }

            box-shadow: 0 0 20px rgba(0, 243, 255, 0.45);
        }
        .btn-coach:hover svg { transform: scale(1.1); filter: drop-shadow(0 0 10px var(--cyan)); }

        function changeLang() {

            const btn = document.getElementById('install-pwa-btn');
            if (btn) btn.innerText = t.install;

            // Оновлення текстів модалки iOS
            document.getElementById('ios-title').innerText = t.ios_title;
            document.getElementById('ios-desc').innerText = t.ios_desc;
            document.getElementById('ios-step-1').innerText = t.ios_step1;
            document.getElementById('ios-step-2').innerText = t.ios_step2;
            document.getElementById('ios-btn-close').innerText = t.ios_close;
        }

        // Обробка події встановлення PWA на Android/Chrome
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); // Запобігаємо автоматичному спливанню дефолтного вікна
            deferredPrompt = e; // Зберігаємо подію
            
            // Показуємо кнопку встановлення для Android
            const installBtn = document.getElementById('install-pwa-btn');
            if (installBtn) installBtn.style.display = 'block';
        });

        // Виявлення iOS пристроїв
        function checkIos() {
            isIos = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            // Показуємо кнопку для iOS користувачів завжди (так як передзапиту немає)
            if (isIos && !window.navigator.standalone) {
                const installBtn = document.getElementById('install-pwa-btn');
                if (installBtn) installBtn.style.display = 'block';
            }
        }

        function triggerInstall() {
            if (isIos) {
                // Відкриваємо кастомну інструкцію для Apple
                document.getElementById('ios-install-modal').style.display = 'flex';
                if (window.umami) umami.track('click-install-ios-modal');
            } else if (deferredPrompt) {
                // Запускаємо системний діалог Google Chrome
                deferredPrompt.prompt();
                if (window.umami) umami.track('click-install-pwa-prompt');
                
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                        if (window.umami) umami.track('install-pwa-success');
                    } else {
                        console.log('User dismissed the install prompt');
                    }
                    deferredPrompt = null;
                    const installBtn = document.getElementById('install-pwa-btn');
                    if (installBtn) installBtn.style.display = 'none';
                });
            }
        }

        function closeIosModal() {
            document.getElementById('ios-install-modal').style.display = 'none';
        }

        window.onload = function() {
            const savedLang = localStorage.getItem('prybambas_lang') || 'en';
            document.getElementById('lang-selector').value = savedLang;
            changeLang();
            checkIos(); // Перевіряємо пристрій

            // Register PWA Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered!', reg))
                    .catch(err => console.log('Service Worker Failed!', err));
            }
        }
    </script>
</body>
</html>
