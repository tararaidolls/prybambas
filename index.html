<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRYBAMBAS | Educational Hub</title>
    <style>
        /* 1. ФОН: Завжди адаптивний, на весь екран */
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* ВСТАВ СЮДИ НАЗВУ СВОЄЇ КАРТИНКИ */
            background-image: url('bg-image.jpg'); 
            background-size: cover;          
            background-position: center center;     
            background-attachment: fixed;    
            background-color: #0b1224;       
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            
            /* Флексбокс для центрування всього контенту */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* 2. ЛОГОТИП / ЗАГОЛОВОК */
        h1 {
            color: white;
            letter-spacing: 4px;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.8), 0 0 40px rgba(255, 0, 255, 0.5);
            margin-bottom: 40px;
            text-align: center;
            margin-top: 60px; /* Місце для перемикача мов */
        }

        /* 3. КОНТЕЙНЕР ДЛЯ ПРОСТОРІВ */
        .hub-container {
            display: flex;
            flex-direction: row; 
            gap: 60px; /* Збільшуємо відстань між колами */
            width: 90%;
            max-width: 1000px;
            justify-content: center;
            padding-bottom: 50px;
            flex-wrap: wrap; /* Щоб на телефонах вони падали вниз */
        }

        /* 4. ДИЗАЙН КНОПОК-ПРОСТОРІВ (Неонові кола) */
        .space-btn {
            position: relative;
            width: 200px;  /* Ширина неонового кола */
            height: 200px; /* Висота неонового кола */
            border-radius: 50%; /* Робимо коло */
            background: rgba(10, 15, 30, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            
            /* Робимо пунктирну лінію як на твоєму малюнку */
            border: 4px dashed currentColor; 
            
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
            
            /* Створюємо ефект неонового світіння (glow) */
            box-shadow: 
                0 0 15px currentColor, 
                inset 0 0 20px currentColor;
        }

        /* Кольори для різних кнопок (успадковуються через currentColor) */
        .btn-whatif { color: #d92cff; } /* Маджента / Рожевий */
        .btn-inventor { color: #54ff3a; } /* Неоновий зелений */
        .btn-coach { color: #00f3ff; } /* Неоновий синій */

        /* Іконка всередині кола */
        .icon {
            font-size: 4rem;
            filter: drop-shadow(0 0 15px currentColor);
        }

        /* Прибираємо старий опис (desc), бо в нових кнопках його немає */
        .desc { display: none; }

        /* Табличка з назвою (Label), яка висить ЗНИЗУ кола */
        .title {
            position: absolute;
            bottom: -20px; /* Опускаємо за межі кола */
            background: rgba(8, 12, 26, 0.95);
            color: currentColor;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 12px 25px;
            border-radius: 50px; /* Овальна форма (pill) */
            border: 2px solid currentColor;
            white-space: nowrap;
            
            /* Світіння таблички */
            box-shadow: 0 0 15px currentColor;
        }

        /* Анімація при наведенні мишки / тапі */
        .space-btn:hover {
            transform: scale(1.05); /* Злегка збільшується */
        }

        /* Селектор мови (верхній правий кут) */
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-weight: bold;
        }

        .lang-switch option {
            background: #0f172a;
            color: white;
        }

        /* =========================================
           МАГІЯ АДАПТИВНОСТІ (Для Мобільних)
           ========================================= */
        @media (max-width: 768px) {
            body, html {
                justify-content: flex-start;
                background-position: center top; 
            }

            .hub-container {
                flex-direction: column; /* Змінюємо рядок на стовпчик! */
                align-items: center; /* Центруємо кола */
                gap: 40px; /* Зменшуємо відстань між колами по вертикалі */
                width: 100%;
            }

            .space-btn {
                width: 170px; /* Зменшуємо розмір кола для телефона */
                height: 170px;
            }

            .icon {
                font-size: 3.5rem;
            }

            .title {
                font-size: 0.9rem;
                padding: 10px 20px;
                bottom: -15px;
            }

            h1 {
                font-size: 2rem;
                margin-bottom: 40px;
                margin-top: 80px;
            }
        }
    </style>
</head>
<body>

    <!-- Вибір мови -->
    <select class="lang-switch" id="lang-selector" onchange="changeLang()">
        <option value="en">🇺🇸 EN</option>
        <option value="uk">🇺🇦 UK</option>
        <option value="es">🇪🇸 ES</option>
        <option value="de">🇩🇪 DE</option>
        <option value="fr">🇫🇷 FR</option>
        <option value="nl">🇳🇱 NL</option>
        <option value="da">🇩🇰 DA</option>
        <option value="sv">🇸🇪 SV</option>
        <option value="ro">🇷🇴 RO</option>
        <option value="pl">🇵🇱 PL</option>
        <option value="pt">🇧🇷 PT</option>
    </select>

    <h1>PRYBAMBAS</h1>

    <!-- Контейнер з картками -->
    <div class="hub-container">
        
        <a href="./what-if/index.html" class="space-btn btn-whatif">
            <div class="icon">🦋</div>
            <div class="title" id="t-whatif">What If?</div>
            <div class="desc" id="d-whatif"></div>
        </a>

        <a href="#inventor" class="space-btn btn-inventor">
            <div class="icon">⚙️</div>
            <div class="title" id="t-inventor">Inventor Lab</div>
            <div class="desc" id="d-inventor"></div>
        </a>

        <a href="#coach" class="space-btn btn-coach">
            <div class="icon">🤖</div>
            <div class="title" id="t-coach">AI Coach</div>
            <div class="desc" id="d-coach"></div>
        </a>

    </div>

    <script>
        // Словник для Хабу
        const dict = {
            en: { tw: "What If?", ti: "Inventor Lab", tc: "AI Coach" },
            uk: { tw: "Що, якби?", ti: "Лабораторія", tc: "AI Тренер" },
            es: { tw: "¿Y Si...?", ti: "Laboratorio", tc: "Coach AI" },
            fr: { tw: "Et Si...?", ti: "Laboratoire", tc: "Coach IA" },
            de: { tw: "Was Wäre?", ti: "Labor", tc: "KI-Coach" },
            ro: { tw: "Ce-ar Fi?", ti: "Laborator", tc: "Coach AI" },
            nl: { tw: "Wat Als?", ti: "Laboratorium", tc: "AI Coach" },
            pt: { tw: "E Se...?", ti: "Laboratório", tc: "Coach AI" },
            pl: { tw: "Co Gdyby?", ti: "Laboratorium", tc: "Trener AI" }
        };

        function changeLang() {
            const lang = document.getElementById('lang-selector').value;
            localStorage.setItem('prybambas_lang', lang);
            
            const t = dict[lang] || dict['en'];
            
            document.getElementById('t-whatif').innerText = t.tw;
            document.getElementById('t-inventor').innerText = t.ti;
            document.getElementById('t-coach').innerText = t.tc;
        }

        // При завантаженні сторінки
        window.onload = function() {
            const savedLang = localStorage.getItem('prybambas_lang') || 'en';
            document.getElementById('lang-selector').value = savedLang;
            changeLang();
        }
    </script>
</body>
</html>
